<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>もろみ無双（プロトタイプ）</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1410; overflow: hidden; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { display: block; background: #1a1410; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
// ============================================================
// もろみ無双 プロトタイプ（清酒無双の手触り層）
// 移動:WASD/矢印 攻撃:Space（糖化） 発酵:X
// 進軍マップ：1地方＝先鋒の蔵→分岐（泥蔵/寒蔵）→総本山の3戦。
// 蔵ごとに発酵度100%で上槽（制圧）→酒米ドロップ→マップに戻って進軍。
// 発酵度70%で火落ち菌が乱入し、殺菌するまで発酵度が減り続ける。
// 総本山制圧で「地方、完全制圧！」→次の地方（敵が強くなる）。
// 死んでも装備（酒米）と精米は持ち越し（ハクスラ周回）。死は同地方の先鋒から。
// ============================================================
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');

let W = 960, H = 640;
function resize() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.width = W; cv.height = H;
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
resize();
addEventListener('resize', resize);

const ARENA = { x: W / 2, y: H / 2, r: 285 };

// ---- メタ進行（周回で持ち越す分。localStorage保存）----
const META_KEY = 'moromi_meta';
let META = { polish: 70, rice: null, best: 0, bestRegion: 1 };
try { Object.assign(META, JSON.parse(localStorage.getItem(META_KEY) || '{}')); } catch (e) {}
function saveMeta() { localStorage.setItem(META_KEY, JSON.stringify(META)); }
window.META = META; // デバッグ用

// 精米歩合→櫂入れダメージ（数値層の攻撃力100/140/170を1/10スケールで移植）
function weaponDmg() { return { 70: 10, 50: 14, 35: 17 }[META.polish] || 10; }

// 酒米（防具）まわり
const RARITY = [
  { label: '並',    color: '#c8bda0', slots: [0, 0] },
  { label: '純米',  color: '#b8d98a', slots: [1, 2] },
  { label: '吟醸',  color: '#8ad9c8', slots: [2, 3] },
  { label: '大吟醸', color: '#ffd76e', slots: [4, 4] }, // 原案どおり4枠確定
];
// レア度テーブル（数値層のEASY/NORMAL/HARD/NIGHTMAREを移植。tier=進軍の深さで決まる）
const DROP_TABLE = [
  [0.60, 0.30, 0.09, 0.01],
  [0.35, 0.40, 0.20, 0.05],
  [0.10, 0.35, 0.40, 0.15],
  [0.00, 0.00, 0.00, 1.00],
];
const SUBS = {
  amylase: { name: 'アミラーゼ活性', desc: '糖化+15%' },
  teion:   { name: '低温長期発酵',  desc: '発酵ダメ+30%' },
  meisui:  { name: '名水仕込み',    desc: '環境無効' },     // 泥蔵・寒蔵の環境悪化を打ち消す
  hiire:   { name: '火入れの極意',  desc: '対火落ち+50%' }, // 火落ち菌へのダメージ増
};
function rollDrop(tier) {
  const table = DROP_TABLE[Math.max(0, Math.min(tier, 3))];
  let r = Math.random(), rarity = 0;
  for (let i = 0; i < 4; i++) { r -= table[i]; if (r < 0) { rarity = i; break; } }
  const [lo, hi] = RARITY[rarity].slots;
  const n = lo + Math.floor(Math.random() * (hi - lo + 1));
  const pool = Object.keys(SUBS);
  const subs = {};
  for (const k of pool.sort(() => Math.random() - 0.5).slice(0, n)) subs[k] = true;
  const name = Math.random() < 0.5 ? '山田錦の魂' : '五百万石の魂';
  return { name, rarity, subs };
}
function riceHas(key) { return !!(META.rice && META.rice.subs && META.rice.subs[key]); }
function riceText(r) {
  if (!r) return '酒米なし';
  return RARITY[r.rarity].label + '・' + r.name + Object.keys(r.subs || {}).map(k => '［' + SUBS[k].desc + '］').join('');
}

// ---- 地方と進軍マップ ----
const REGION_NAMES = ['近畿', '中部', '関東', '東北', '九州', '北海道'];
function regionName() {
  const base = REGION_NAMES[(G.regionIdx - 1) % REGION_NAMES.length];
  return G.regionIdx > REGION_NAMES.length ? base + '·' + Math.ceil(G.regionIdx / REGION_NAMES.length) + '周' : base;
}
// 進軍図：rank0=先鋒 → rank1=分岐 → rank2=総本山
const RANKS = [
  [{ name: '先鋒の蔵', desc: '標準の仕込み', mod: {} }],
  [
    { name: '泥蔵', desc: '野生酵母が多い', mod: { elite: 2.5 } },
    { name: '寒蔵', desc: '雑菌の湧きが激しい', mod: { spawn: 1.35 } },
  ],
  [{ name: '総本山・山田錦の巨大蔵', desc: '火落ち菌が強大', mod: { hiochiHp: 1.6 }, boss: true }],
];
const GAUGE_ADD = [30, 30, 40]; // 蔵制圧ごとの地方総アルコール上昇
function kuraLevel() { return (G.regionIdx - 1) * 3 + G.rank + 1; } // 敵スケールの通し番手
function nodeMod(key) { // 名水仕込み：泥蔵・寒蔵の環境悪化を無効化
  if (riceHas('meisui')) return 1;
  return (G.node && G.node.mod[key]) || 1;
}

// ---- 入力 ----
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  const ok = e.code === 'Space' || e.code === 'Enter';
  if (G.mode === 'over') { if (e.code === 'KeyR') restartRegion(); return; }
  if (G.mode === 'result') {
    if (G.result && G.result.needChoice && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS'].includes(e.code)) G.choice = 1 - G.choice;
    if (ok && G.resultT > 0.6) {
      if (G.result && G.result.needChoice && G.choice === 0) { META.rice = G.result.drop; saveMeta(); }
      afterResult();
    }
    return;
  }
  if (G.mode === 'regionclear') { if (ok && G.clearT > 0.8) nextRegion(); return; }
  if (G.mode === 'map') {
    const nodes = RANKS[G.rank];
    if (['ArrowLeft','KeyA','ArrowUp','KeyW'].includes(e.code)) G.selIdx = (G.selIdx + nodes.length - 1) % nodes.length;
    if (['ArrowRight','KeyD','ArrowDown','KeyS'].includes(e.code)) G.selIdx = (G.selIdx + 1) % nodes.length;
    if (ok && G.mapT > 0.4) startKura(nodes[G.selIdx]);
    return;
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });

// ---- 状態（1周ぶん）----
const G = {
  t: 0, mode: 'map', shake: 0,
  kills: 0, combo: 0, comboT: 0,
  glucose: 0, glucoseMax: 60, // 糖化ゲージ（ヒット1につき+1）
  regionIdx: 1, rank: 0, regionGauge: 0, node: null, selIdx: 0, mapT: 0, clearT: 0,
  kuraAlcohol: 0, kuraStart: 0, hiochiDone: false,
  player: null, enemies: [], particles: [], waves: [], texts: [],
  swing: null, spawnT: 0,
  hiochi: null, alarm: 0,
  result: null, resultT: 0,
};
window.G = G; // デバッグ用

function newRun() {
  G.t = 0;
  G.regionIdx = 1;
  restartRegion();
}

function restartRegion() { // 腐造しても装備は残る。同じ地方の先鋒からやり直し
  G.kills = 0; G.combo = 0; G.comboT = 0;
  G.glucose = 0; G.shake = 0;
  G.rank = 0; G.regionGauge = 0; G.node = null; G.selIdx = 0; G.mapT = 0;
  G.player = null; // 仕込み直しは満タンで始める（蔵越えの+1回復と区別）
  G.mode = 'map';
}

function startKura(node) {
  G.node = node;
  G.mode = 'battle';
  G.kuraAlcohol = 0; G.kuraStart = G.t; G.hiochiDone = false;
  G.enemies = []; G.particles = []; G.waves = []; G.texts = [];
  G.swing = null; G.spawnT = 0; G.hiochi = null; G.alarm = 0;
  const hp = G.player ? Math.min(G.player.hp + 1, 5) : 5; // 蔵を越えると一杯回復
  G.player = { x: ARENA.x, y: ARENA.y, face: -Math.PI / 2, hp, inv: 0, atkCd: 0 };
  for (let i = 0; i < 20; i++) spawnEnemy(false); // 開幕から群れがいる
  addText(ARENA.x, ARENA.y - 150, regionName() + '・' + node.name, '#f2e9d4', 30);
}
newRun();

// ---- 敵 ----
function kuraT() { return G.t - G.kuraStart; }

function spawnEnemy(elite) {
  const a = Math.random() * Math.PI * 2;
  const spd = 1 + 0.04 * (kuraLevel() - 1); // 進軍が深いほど機敏になる
  const e = {
    x: ARENA.x + Math.cos(a) * (ARENA.r - 12),
    y: ARENA.y + Math.sin(a) * (ARENA.r - 12),
    kx: 0, ky: 0, wob: Math.random() * 10,
    elite: !!elite,
    r: elite ? 22 : 11,
    hp: elite ? 60 : 10,
    sp: (elite ? 34 : 46 + Math.random() * 26) * spd,
    flash: 0,
  };
  G.enemies.push(e);
}

// ---- 火落ち菌乱入（呂布枠）----
// 発酵度70%で乱入。殺菌するまで発酵度が減り続け、上槽（制圧）できない
function spawnHiochi() {
  const a = Math.random() * Math.PI * 2;
  const h = {
    x: ARENA.x + Math.cos(a) * (ARENA.r - 40),
    y: ARENA.y + Math.sin(a) * (ARENA.r - 40),
    kx: 0, ky: 0, wob: 0,
    hiochi: true, elite: false,
    r: 30,
    hp: Math.round((350 + 80 * (kuraLevel() - 1)) * (G.node.mod.hiochiHp || 1)),
    maxHp: Math.round((350 + 80 * (kuraLevel() - 1)) * (G.node.mod.hiochiHp || 1)),
    sp: 30, flash: 0, regenT: 0,
    regen: 7 + 2 * (kuraLevel() - 1),
  };
  G.enemies.push(h);
  G.hiochi = h;
  G.alarm = 1.6;
  G.shake = 16;
  addText(ARENA.x, ARENA.y - 120, '警報：火落ち菌が乱入！', '#ff5a4a', 30);
  addText(ARENA.x, ARENA.y - 88, '殺菌するまで発酵度が下がる！', '#ff9d6e', 17);
}

// ---- 発酵度（蔵の制圧ゲージ）----
function addAlcohol(v) {
  const cap = G.hiochi ? 99 : 100; // 乱入中はクリア不可
  G.kuraAlcohol = Math.min(G.kuraAlcohol + v, cap);
  if (G.kuraAlcohol >= 100 && G.mode === 'battle') joso();
}

// ---- 攻撃 ----
const SWEEP = { range: 105, arc: Math.PI * 1.25, time: 0.16, cd: 0.26 };

function attack() {
  const p = G.player;
  p.atkCd = SWEEP.cd;
  G.swing = { t: 0, face: p.face };
  let hit = 0;
  const crit = META.rice && META.rice.name === '山田錦の魂' && Math.random() < 0.15; // 山田錦=会心15%
  const dmg = weaponDmg() * (crit ? 2 : 1);
  for (const e of G.enemies) {
    const dx = e.x - p.x, dy = e.y - p.y;
    const d = Math.hypot(dx, dy);
    if (d > SWEEP.range + e.r) continue;
    let da = Math.atan2(dy, dx) - p.face;
    da = Math.atan2(Math.sin(da), Math.cos(da));
    if (Math.abs(da) > SWEEP.arc / 2) continue;
    e.hp -= dmg * (e.hiochi && riceHas('hiire') ? 1.5 : 1); e.flash = 0.12; hit++;
    if (crit && (e.elite || e.hiochi)) addText(e.x, e.y - 30, '会心！', '#ffd76e', 14);
    const kb = e.hiochi ? 30 : e.elite ? 90 : 260;
    e.kx += Math.cos(p.face + da * 0.4) * kb;
    e.ky += Math.sin(p.face + da * 0.4) * kb;
  }
  if (hit) {
    G.shake = Math.min(G.shake + 2 + hit * 0.6, 9);
    // 糖化：当てた数だけブドウ糖が溜まる（アミラーゼ活性で+15%）
    G.glucose = Math.min(G.glucose + hit * (riceHas('amylase') ? 1.15 : 1), G.glucoseMax);
  }
}

function ferment() {
  G.glucose = 0;
  G.waves.push({ x: G.player.x, y: G.player.y, r: 10, max: 275 });
  G.shake = 14;
  addText(G.player.x, G.player.y - 60, '発酵！アルコール爆発！', '#ffd76e', 26);
}

function addText(x, y, str, col, size) {
  G.texts.push({ x, y, str, col, size: size || 15, t: 0.9 });
}

function kill(e, i) {
  G.enemies.splice(i, 1);
  G.kills++;
  G.combo++; G.comboT = 1.3;
  for (let k = 0; k < (e.hiochi ? 40 : e.elite ? 14 : 6); k++) {
    const a = Math.random() * Math.PI * 2, v = 40 + Math.random() * (e.hiochi ? 220 : 130);
    G.particles.push({ x: e.x, y: e.y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, t: 0.4 + Math.random() * 0.3, elite: e.elite || e.hiochi });
  }
  if (e.hiochi) {
    G.hiochi = null;
    G.hiochiDone = true;
    G.shake = 14;
    addText(e.x, e.y, '殺菌完了！', '#ffd76e', 30);
    addAlcohol(8);
  } else if (e.elite) {
    addText(e.x, e.y, '野生酵母 撃破！', '#ff9d6e', 18);
    addAlcohol(5);
  } else {
    addAlcohol(1.2);
  }
}

// ---- 上槽（蔵制圧・ドロップ）----
function joso() {
  G.mode = 'result'; G.resultT = 0;
  G.regionGauge = Math.min(G.regionGauge + GAUGE_ADD[G.rank], 100);
  // ドロップのレア度tier：進軍の深さ＋地方の番手で良くなる
  const drop = rollDrop(G.rank + G.regionIdx - 1);
  // 装備は自動でなくプレイヤーが選ぶ（初回だけ自動装備）
  const cur = META.rice;
  const needChoice = !!cur;
  if (!cur) META.rice = drop;
  G.choice = needChoice && drop.rarity > cur.rarity ? 0 : 1; // レア度が上なら「着る」を初期選択
  // 精米イベント：地方1・地方2の総本山制圧で研ぎが進む
  let polished = null;
  if (G.node.boss) {
    if (G.regionIdx === 1 && META.polish === 70) { META.polish = 50; polished = '70%→50%（攻撃力+40%）'; }
    if (G.regionIdx === 2 && META.polish === 50) { META.polish = 35; polished = '50%→35%（攻撃力+70%）'; }
    META.bestRegion = Math.max(META.bestRegion, G.regionIdx + 1);
  }
  saveMeta();
  G.result = { drop, needChoice, polished };
}

function afterResult() { // 上槽リザルトを閉じたあとの行き先
  if (G.node.boss) { G.mode = 'regionclear'; G.clearT = 0; }
  else { G.rank++; G.selIdx = 0; G.mapT = 0; G.mode = 'map'; }
}

function nextRegion() {
  G.regionIdx++;
  G.rank = 0; G.regionGauge = 0; G.selIdx = 0; G.mapT = 0;
  G.mode = 'map';
}

// ---- 更新 ----
function update(dt) {
  G.t += dt;
  if (G.mode === 'map') { G.mapT += dt; return; }
  if (G.mode === 'regionclear') { G.clearT += dt; return; }
  if (G.mode === 'result') { G.resultT += dt; return; }
  if (G.mode !== 'battle') return;
  const p = G.player;

  // 移動（五百万石=速度+10%）
  const spd = 215 * (META.rice && META.rice.name === '五百万石の魂' ? 1.1 : 1);
  let mx = 0, my = 0;
  if (keys.KeyW || keys.ArrowUp) my--;
  if (keys.KeyS || keys.ArrowDown) my++;
  if (keys.KeyA || keys.ArrowLeft) mx--;
  if (keys.KeyD || keys.ArrowRight) mx++;
  if (mx || my) {
    const l = Math.hypot(mx, my);
    p.x += mx / l * spd * dt;
    p.y += my / l * spd * dt;
    p.face = Math.atan2(my, mx);
  }
  const pd = Math.hypot(p.x - ARENA.x, p.y - ARENA.y);
  const lim = ARENA.r - 18;
  if (pd > lim) {
    p.x = ARENA.x + (p.x - ARENA.x) / pd * lim;
    p.y = ARENA.y + (p.y - ARENA.y) / pd * lim;
  }

  // 攻撃
  p.atkCd -= dt;
  if (keys.Space && p.atkCd <= 0) attack();
  if ((keys.KeyX || keys.Enter) && G.glucose >= G.glucoseMax) ferment();
  if (G.swing) { G.swing.t += dt; if (G.swing.t > SWEEP.time) G.swing = null; }
  p.inv -= dt;

  // 敵スポーン（蔵内時間と蔵の番手で増える）
  G.spawnT -= dt;
  if (G.spawnT <= 0) {
    const kt = kuraT();
    const lv = kuraLevel();
    const rate = Math.max(0.55 - kt * 0.012, 0.10) / (1 + 0.15 * (lv - 1)) / nodeMod('spawn');
    G.spawnT = rate;
    const n = 1 + Math.floor(kt / 25) + Math.floor((lv - 1) / 2);
    const eliteP = (0.04 + kt * 0.0007 + 0.02 * (lv - 1)) * nodeMod('elite');
    for (let i = 0; i < n; i++) spawnEnemy(Math.random() < eliteP);
  }
  // 火落ち菌乱入判定＋出現中のペナルティ（発酵度が減る）
  if (!G.hiochiDone && !G.hiochi && G.kuraAlcohol >= 70) spawnHiochi();
  if (G.hiochi) G.kuraAlcohol = Math.max(G.kuraAlcohol - 2 * dt, 0);
  G.alarm = Math.max(G.alarm - dt, 0);

  // 敵更新
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    if (e.hp <= 0) { kill(e, i); continue; }
    e.flash -= dt;
    if (e.hiochi) { // 自己再生：放置すると押し返される
      e.regenT += dt;
      if (e.regenT >= 1.5) { e.regenT = 0; e.hp = Math.min(e.hp + e.regen, e.maxHp); }
    }
    const dx = p.x - e.x, dy = p.y - e.y, d = Math.hypot(dx, dy) || 1;
    e.x += (dx / d * e.sp + e.kx) * dt;
    e.y += (dy / d * e.sp + e.ky) * dt;
    e.kx *= Math.pow(0.005, dt); e.ky *= Math.pow(0.005, dt);
    // プレイヤー接触
    if (d < e.r + 14 && p.inv <= 0) {
      p.hp--; p.inv = 1.1; G.shake = 10;
      for (const o of G.enemies) {
        const ox = o.x - p.x, oy = o.y - p.y, od = Math.hypot(ox, oy) || 1;
        if (od < 130) { o.kx += ox / od * 320; o.ky += oy / od * 320; }
      }
      if (p.hp <= 0) {
        G.mode = 'over';
        if (G.kills > META.best) META.best = G.kills;
        saveMeta();
      }
    }
  }

  // 発酵の衝撃波
  for (let i = G.waves.length - 1; i >= 0; i--) {
    const w = G.waves[i];
    w.r += 900 * dt;
    for (let j = G.enemies.length - 1; j >= 0; j--) {
      const e = G.enemies[j];
      if (Math.hypot(e.x - w.x, e.y - w.y) >= w.r + e.r) continue;
      if (e.hiochi) { // 火落ち菌は即死せず大ダメージのみ（1波につき1回、低温長期発酵で+30%）
        if (e.hitBy !== w) {
          e.hitBy = w;
          e.hp -= Math.round(120 * (riceHas('teion') ? 1.3 : 1) * (riceHas('hiire') ? 1.5 : 1));
          e.flash = 0.2;
          if (e.hp <= 0) kill(e, j);
        }
      } else { e.hp = 0; kill(e, j); }
    }
    if (w.r > w.max) G.waves.splice(i, 1);
  }

  // コンボ・演出
  G.comboT -= dt;
  if (G.comboT <= 0) G.combo = 0;
  G.shake = Math.max(G.shake - dt * 30, 0);
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const q = G.particles[i];
    q.t -= dt; q.x += q.vx * dt; q.y += q.vy * dt;
    q.vx *= 0.92; q.vy *= 0.92;
    if (q.t <= 0) G.particles.splice(i, 1);
  }
  for (let i = G.texts.length - 1; i >= 0; i--) {
    const t = G.texts[i];
    t.t -= dt; t.y -= 26 * dt;
    if (t.t <= 0) G.texts.splice(i, 1);
  }
}

// ---- 描画 ----
function draw() {
  if (G.mode === 'map') { drawMap(); return; }
  if (G.mode === 'regionclear') { drawRegionClear(); return; }
  cx.save();
  cx.clearRect(0, 0, W, H);
  if (G.shake > 0) cx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);

  // タンク
  cx.beginPath(); cx.arc(ARENA.x, ARENA.y, ARENA.r + 14, 0, 7);
  cx.fillStyle = '#3a2e24'; cx.fill();
  const grad = cx.createRadialGradient(ARENA.x, ARENA.y - 60, 40, ARENA.x, ARENA.y, ARENA.r);
  grad.addColorStop(0, '#f2e9d4'); grad.addColorStop(1, '#ddceac');
  cx.beginPath(); cx.arc(ARENA.x, ARENA.y, ARENA.r, 0, 7);
  cx.fillStyle = grad; cx.fill();
  // もろみの泡
  cx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < 24; i++) {
    const a = i * 2.62 + G.t * 0.13, rr = (i * 53.7) % ARENA.r * 0.92;
    cx.beginPath();
    cx.arc(ARENA.x + Math.cos(a) * rr, ARENA.y + Math.sin(a) * rr, 3 + (i % 4), 0, 7);
    cx.fill();
  }

  // 衝撃波
  for (const w of G.waves) {
    cx.beginPath(); cx.arc(w.x, w.y, w.r, 0, 7);
    cx.strokeStyle = 'rgba(255,215,110,' + (1 - w.r / w.max) + ')';
    cx.lineWidth = 16; cx.stroke();
  }

  // 敵
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  for (const e of G.enemies) {
    const wob = Math.sin(G.t * 6 + e.wob) * 2;
    if (e.hiochi) {
      const au = cx.createRadialGradient(e.x, e.y, 8, e.x, e.y, 58);
      au.addColorStop(0, 'rgba(140,10,25,0.55)');
      au.addColorStop(1, 'rgba(60,0,10,0)');
      cx.beginPath(); cx.arc(e.x, e.y, 58, 0, 7);
      cx.fillStyle = au; cx.fill();
    }
    const glyph = e.hiochi ? '👹' : e.elite ? '😈' : '🦠';
    cx.font = (e.hiochi ? 58 : e.elite ? 44 : 22) + 'px serif';
    if (e.flash > 0) {
      cx.save(); cx.filter = 'brightness(3)';
      cx.fillText(glyph, e.x, e.y + wob);
      cx.restore();
    } else {
      cx.fillText(glyph, e.x, e.y + wob);
    }
    if (e.hiochi) { // ボスHPバー
      cx.fillStyle = 'rgba(20,10,8,0.6)';
      cx.fillRect(e.x - 32, e.y - 48, 64, 6);
      cx.fillStyle = '#ff5a4a';
      cx.fillRect(e.x - 32, e.y - 48, 64 * e.hp / e.maxHp, 6);
    }
  }

  // プレイヤー（麹坊や）
  const p = G.player;
  if (!(p.inv > 0 && Math.floor(G.t * 14) % 2)) {
    cx.beginPath(); cx.arc(p.x, p.y, 16, 0, 7);
    cx.fillStyle = '#fffdf5'; cx.fill();
    cx.lineWidth = 2.5; cx.strokeStyle = '#8a7a55'; cx.stroke();
    cx.fillStyle = '#4a3b22'; cx.font = 'bold 15px serif';
    cx.fillText('麹', p.x, p.y + 1);
  }

  // 櫂棒スイング
  if (G.swing) {
    const pr = G.swing.t / SWEEP.time;
    const a0 = G.swing.face - SWEEP.arc / 2;
    const a1 = a0 + SWEEP.arc * pr;
    cx.beginPath();
    cx.moveTo(p.x, p.y);
    cx.arc(p.x, p.y, SWEEP.range, a0, a1);
    cx.closePath();
    cx.fillStyle = 'rgba(255,240,190,0.45)'; cx.fill();
    cx.strokeStyle = '#8a5a2b'; cx.lineWidth = 7; cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(p.x + Math.cos(a1) * 14, p.y + Math.sin(a1) * 14);
    cx.lineTo(p.x + Math.cos(a1) * (SWEEP.range - 6), p.y + Math.sin(a1) * (SWEEP.range - 6));
    cx.stroke();
  }

  // パーティクル
  for (const q of G.particles) {
    cx.globalAlpha = Math.max(q.t * 2, 0);
    cx.fillStyle = q.elite ? '#ff9d6e' : '#b8d98a';
    cx.beginPath(); cx.arc(q.x, q.y, q.elite ? 4 : 2.5, 0, 7);
    cx.fill();
  }
  cx.globalAlpha = 1;

  // フロートテキスト
  for (const t of G.texts) {
    cx.globalAlpha = Math.min(t.t * 2, 1);
    cx.font = 'bold ' + t.size + 'px serif';
    cx.fillStyle = t.col;
    cx.fillText(t.str, t.x, t.y);
  }
  cx.globalAlpha = 1;
  cx.restore();

  // 警報フラッシュ
  if (G.alarm > 0 && Math.floor(G.t * 8) % 2) {
    cx.fillStyle = 'rgba(255,40,30,' + (0.22 * G.alarm) + ')';
    cx.fillRect(0, 0, W, H);
  }

  // ---- UI ----
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  // 純度（残機）
  cx.font = '26px serif';
  for (let i = 0; i < 5; i++) {
    cx.globalAlpha = i < p.hp ? 1 : 0.18;
    cx.fillText('🍶', 16 + i * 32, 12);
  }
  cx.globalAlpha = 1;
  // 撃破数
  cx.textAlign = 'right';
  cx.fillStyle = '#f2e9d4';
  cx.font = 'bold 34px serif';
  cx.fillText(G.kills + ' 斬', W - 20, 10);
  cx.font = '13px serif';
  cx.fillStyle = '#9a8c72';
  cx.fillText('最高 ' + META.best + ' 斬 ／ 最深 第' + META.bestRegion + '地方', W - 20, 48);
  // 装備（右下）
  cx.textBaseline = 'bottom';
  cx.font = '13px serif';
  cx.fillStyle = '#9a8c72';
  cx.fillText(riceText(META.rice), W - 20, H - 26);
  cx.fillText('精米 ' + META.polish + '%（攻' + weaponDmg() + '）', W - 20, H - 8);
  // コンボ
  if (G.combo >= 5) {
    cx.textAlign = 'center'; cx.textBaseline = 'top';
    cx.fillStyle = '#ffd76e';
    cx.font = 'bold ' + Math.min(22 + G.combo * 0.4, 40) + 'px serif';
    cx.fillText(G.combo + ' 連斬', W / 2, 14);
  }
  // 蔵の発酵度（制圧ゲージ）
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  cx.font = 'bold 15px serif';
  cx.fillStyle = G.hiochi ? '#ff5a4a' : '#f2e9d4';
  cx.fillText(regionName() + '・' + G.node.name + '　発酵度 ' + Math.floor(G.kuraAlcohol) + '%', W / 2, 54);
  cx.fillStyle = 'rgba(20,10,8,0.5)';
  cx.fillRect(W / 2 - 110, 76, 220, 7);
  cx.fillStyle = G.hiochi ? '#ff5a4a' : '#b8a26e';
  cx.fillRect(W / 2 - 110, 76, 220 * Math.min(G.kuraAlcohol / 100, 1), 7);
  // 糖化ゲージ（「糖」の文字が満ちる）
  const mr = G.glucose / G.glucoseMax;
  cx.textAlign = 'left'; cx.textBaseline = 'bottom';
  cx.font = 'bold 44px serif';
  cx.fillStyle = 'rgba(255,215,110,0.18)';
  cx.fillText('糖', 18, H - 14);
  if (mr > 0) {
    cx.save();
    cx.beginPath(); cx.rect(0, H - 14 - 48 * mr, 90, 48 * mr); cx.clip();
    cx.fillStyle = mr >= 1 ? '#ffd76e' : '#b8a26e';
    cx.fillText('糖', 18, H - 14);
    cx.restore();
  }
  if (mr >= 1 && Math.floor(G.t * 3) % 2) {
    cx.font = '13px serif'; cx.fillStyle = '#ffd76e';
    cx.fillText('Xで発酵！', 74, H - 30);
  }
  // 操作説明
  cx.textAlign = 'center';
  cx.font = '13px serif'; cx.fillStyle = '#6a5c48';
  cx.fillText('WASD/矢印: 櫂を運ぶ　Space: 櫂入れ（糖化）　X: 発酵', W / 2, H - 8);

  // 上槽リザルト
  if (G.mode === 'result' && G.result) {
    cx.fillStyle = 'rgba(20,12,8,0.78)';
    cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillStyle = '#f2e9d4';
    cx.font = 'bold 40px serif';
    cx.fillText('上槽！　' + G.node.name + ' 制圧', W / 2, H / 2 - 110);
    const d = G.result.drop;
    cx.font = 'bold 26px serif';
    cx.fillStyle = RARITY[d.rarity].color;
    cx.fillText('ドロップ：' + RARITY[d.rarity].label + '・' + d.name, W / 2, H / 2 - 40);
    const subKeys = Object.keys(d.subs);
    cx.font = '17px serif';
    cx.fillStyle = '#c8bda0';
    cx.fillText(subKeys.length ? subKeys.map(k => SUBS[k].name + '（' + SUBS[k].desc + '）').join('　') : 'サブスキルなし', W / 2, H / 2 - 4);
    if (G.result.needChoice) {
      const opts = [
        { label: '新しい酒米を着る', rice: d },
        { label: '今の酒米でいく　', rice: META.rice },
      ];
      cx.font = '13px serif'; cx.fillStyle = '#6a5c48';
      cx.fillText('←→で選択', W / 2, H / 2 + 26);
      opts.forEach((o, i) => {
        const sel = G.choice === i;
        cx.font = (sel ? 'bold ' : '') + '16px serif';
        cx.fillStyle = sel ? '#ffd76e' : '#8a7c62';
        cx.fillText((sel ? '▶ ' : '　 ') + o.label + '：' + riceText(o.rice), W / 2, H / 2 + 52 + i * 28);
      });
    } else {
      cx.fillStyle = '#b8d98a';
      cx.fillText('はじめての酒米。装備した！', W / 2, H / 2 + 40);
    }
    if (G.result.polished) {
      cx.fillStyle = '#ffd76e'; cx.font = '17px serif';
      cx.fillText('精米イベント：大刀を研いだ　' + G.result.polished, W / 2, H / 2 + 128);
    }
    if (G.resultT > 0.6 && Math.floor(G.t * 2) % 2 === 0) {
      cx.font = '17px serif'; cx.fillStyle = '#9a8c72';
      cx.fillText(G.node.boss ? 'Space で地方制圧の儀へ' : 'Space で進軍図に戻る', W / 2, H / 2 + 162);
    }
  }

  // ゲームオーバー
  if (G.mode === 'over') {
    cx.fillStyle = 'rgba(20,12,8,0.72)';
    cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillStyle = '#f2e9d4';
    cx.font = 'bold 42px serif';
    cx.fillText('もろみ、腐造す…', W / 2, H / 2 - 70);
    cx.font = 'bold 30px serif';
    cx.fillStyle = '#ffd76e';
    cx.fillText(regionName() + '・' + (G.node ? G.node.name : '') + 'で ' + G.kills + ' 斬', W / 2, H / 2 - 10);
    cx.font = '17px serif';
    cx.fillStyle = '#b8d98a';
    cx.fillText('酒米と精米は持ち越し。次の仕込みはもっと強い', W / 2, H / 2 + 32);
    cx.fillStyle = '#9a8c72';
    cx.fillText('Rキーで' + regionName() + '地方の先鋒からもう一仕込み', W / 2, H / 2 + 66);
  }
}

// ---- 進軍マップ描画 ----
function nodePos(r, i, count) {
  const xs = [W / 2 - 270, W / 2, W / 2 + 270];
  return { x: xs[r], y: H / 2 + 40 + (count === 1 ? 0 : (i === 0 ? -85 : 85)) };
}

function drawMap() {
  cx.fillStyle = '#241c14'; cx.fillRect(0, 0, W, H);
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillStyle = '#f2e9d4'; cx.font = 'bold 32px serif';
  cx.fillText(regionName() + '地方 進軍図', W / 2, 64);
  // 地方の総アルコールゲージ
  cx.font = '14px serif'; cx.fillStyle = '#9a8c72';
  cx.fillText('地方制圧度（総アルコール）　' + Math.floor(G.regionGauge) + ' / 100', W / 2, 102);
  cx.fillStyle = 'rgba(20,10,8,0.6)'; cx.fillRect(W / 2 - 160, 116, 320, 9);
  cx.fillStyle = '#b8a26e'; cx.fillRect(W / 2 - 160, 116, 320 * G.regionGauge / 100, 9);
  // 街道（辺）
  cx.strokeStyle = '#5a4c38'; cx.lineWidth = 3;
  for (let r = 0; r < RANKS.length - 1; r++)
    for (let i = 0; i < RANKS[r].length; i++)
      for (let j = 0; j < RANKS[r + 1].length; j++) {
        const a = nodePos(r, i, RANKS[r].length), b = nodePos(r + 1, j, RANKS[r + 1].length);
        cx.beginPath(); cx.moveTo(a.x, a.y); cx.lineTo(b.x, b.y); cx.stroke();
      }
  // 蔵（ノード）
  for (let r = 0; r < RANKS.length; r++)
    for (let i = 0; i < RANKS[r].length; i++) {
      const nd = RANKS[r][i], p = nodePos(r, i, RANKS[r].length);
      const cleared = r < G.rank;
      const sel = r === G.rank && i === G.selIdx;
      cx.beginPath(); cx.arc(p.x, p.y, nd.boss ? 36 : 28, 0, 7);
      cx.fillStyle = cleared ? '#33422a' : sel ? '#4a3b28' : '#2c241a';
      cx.fill();
      cx.lineWidth = sel ? 4 : 2;
      cx.strokeStyle = sel ? '#ffd76e' : cleared ? '#b8d98a' : '#6a5c48';
      cx.stroke();
      cx.font = (nd.boss ? 32 : 26) + 'px serif';
      cx.fillText(cleared ? '🍶' : nd.boss ? '🏯' : '🏚', p.x, p.y + 1);
      cx.font = 'bold 15px serif';
      cx.fillStyle = sel ? '#ffd76e' : cleared ? '#8a9c72' : '#c8bda0';
      cx.fillText(nd.name, p.x, p.y + (nd.boss ? 62 : 54));
      cx.font = '12px serif'; cx.fillStyle = '#9a8c72';
      cx.fillText(cleared ? '制圧済み' : nd.desc, p.x, p.y + (nd.boss ? 80 : 72));
    }
  // 麹坊や（現在の進軍先の上でぴょこぴょこ）
  const sp = nodePos(G.rank, G.selIdx, RANKS[G.rank].length);
  const bob = Math.sin(G.t * 5) * 4;
  const py = sp.y - (RANKS[G.rank][G.selIdx].boss ? 66 : 58) + bob;
  cx.beginPath(); cx.arc(sp.x, py, 14, 0, 7);
  cx.fillStyle = '#fffdf5'; cx.fill();
  cx.lineWidth = 2; cx.strokeStyle = '#8a7a55'; cx.stroke();
  cx.fillStyle = '#4a3b22'; cx.font = 'bold 13px serif';
  cx.fillText('麹', sp.x, py + 1);
  // 装備と操作
  cx.textAlign = 'right'; cx.textBaseline = 'bottom';
  cx.font = '13px serif'; cx.fillStyle = '#9a8c72';
  cx.fillText(riceText(META.rice), W - 20, H - 26);
  cx.fillText('精米 ' + META.polish + '%（攻' + weaponDmg() + '）', W - 20, H - 8);
  cx.textAlign = 'center';
  cx.fillStyle = '#6a5c48';
  cx.fillText(RANKS[G.rank].length > 1 ? '←→で蔵を選択　Spaceで進軍' : 'Spaceで進軍', W / 2, H - 8);
}

function drawRegionClear() {
  cx.fillStyle = '#241c14'; cx.fillRect(0, 0, W, H);
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillStyle = '#ffd76e';
  cx.font = 'bold 46px serif';
  cx.fillText(regionName() + '地方、完全制圧！', W / 2, H / 2 - 70);
  cx.font = '20px serif'; cx.fillStyle = '#f2e9d4';
  cx.fillText('総アルコール 100 ／ ここまで ' + G.kills + ' 斬', W / 2, H / 2 - 10);
  cx.font = '15px serif'; cx.fillStyle = '#9a8c72';
  cx.fillText('次の地方は敵が強くなり、酒米のドロップも上等になる', W / 2, H / 2 + 30);
  if (G.clearT > 0.8 && Math.floor(G.t * 2) % 2 === 0) {
    cx.font = '17px serif'; cx.fillStyle = '#c8bda0';
    cx.fillText('Space で ' + REGION_NAMES[G.regionIdx % REGION_NAMES.length] + '地方へ進軍', W / 2, H / 2 + 84);
  }
}

// ---- ループ ----
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
