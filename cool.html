<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清酒無双（クール試作）</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍶</text></svg>">
<meta name="description" content="日本酒の醸造工程がそのままゲームシステムに。櫂棒で雑菌の大群をなぎ倒し、糖化→発酵の必殺技で蔵を浄化する醸造ハクスラ無双。">
<meta property="og:title" content="清酒無双">
<meta property="og:description" content="醸して、なぎ倒せ。日本酒の醸造工程をハクスラ無双に昇華したブラウザゲーム。スマホ対応（横持ち推奨）">
<meta property="og:type" content="website">
<meta property="og:url" content="https://y-kanno-sakenote.github.io/seishu-musou/">
<meta name="twitter:card" content="summary">
<style>
  html, body { margin: 0; padding: 0; background: #0b0908; overflow: hidden; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { display: block; background: #0b0908; touch-action: none; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
// ============================================================
// 清酒無双（旧名：もろみ無双プロトタイプ）
// 移動:WASD/矢印 攻撃:Space（糖化） 発酵:X 酵母:C 装備:E 音:M ／ スマホはタッチ操作
// 進軍マップ：1地方＝先鋒の蔵→分岐（泥蔵/寒蔵）→総本山の3戦。
// 蔵ごとに発酵度100%で上槽（制圧）→酒米ドロップ→マップに戻って進軍。
// 発酵度70%で火落ち菌が乱入し、殺菌するまで発酵度が減り続ける。
// 総本山制圧で「地方、完全制圧！」→次の地方（敵が強くなる）。
// 死んでも装備（酒米）と精米は持ち越し（ハクスラ周回）。死は同地方の先鋒から。
// ============================================================
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');

let W = 960, H = 640;
function resize() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.width = W; cv.height = H;
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
resize();
addEventListener('resize', resize);

const ARENA = { x: W / 2, y: H / 2, r: 750 }; // 大仕込みタンク（画面の約2.5倍・カメラ追従）

// ---- メタ進行（周回で持ち越す分。localStorage保存）----
const META_KEY = 'moromi_meta';
let META = { v: 1, polish: 70, rice: null, weapon: null, bagRice: [], bagWeapons: [], best: 0, regionClear: {}, gokui: [], mute: false };
try { Object.assign(META, JSON.parse(localStorage.getItem(META_KEY) || '{}')); } catch (e) {}
function saveMeta() { localStorage.setItem(META_KEY, JSON.stringify(META)); }
window.META = META; // デバッグ用

// 精米歩合→櫂入れダメージ（数値層の攻撃力100/140/170を1/10スケールで移植）
// 精米は武器でなく蔵人の腕（METAで持ち、武器を替えても引き継ぐ）
function weaponDmg() { return { 70: 10, 50: 14, 35: 17 }[META.polish] || 10; }

// 麹武器（武器種×麹×仕込みの組み合わせが個性）。火落ち菌の戦利品（武器種は地域の特産）
const WTYPES = {
  daito: { label: '大刀', desc: '標準のなぎ払い', cd: 1, range: 1, arc: 1, dmg: 1 },
  soken: { label: '双剣', desc: '速い小範囲', cd: 0.6, range: 0.75, arc: 1, dmg: 0.75 },
  yari:  { label: '長槍', desc: '直線の長リーチ', cd: 1.1, range: 1.9, arc: 0.35, dmg: 1.3 },
  otsuchi: { label: '大槌', desc: '遅いが一撃が重い', cd: 1.5, range: 1.1, arc: 1.2, dmg: 1.9 },
  naginata: { label: '薙刀', desc: '広く薙ぎ払う', cd: 1.15, range: 1.2, arc: 1.4, dmg: 0.95 },
};
function wtypeOf(w) { return WTYPES[(w && w.type) || 'daito']; }
const KOJI = {
  yellow: { name: '黄麹', desc: 'クリ率+15%' },
  white:  { name: '白麹', desc: '被弾の20%を弾く' },
  black:  { name: '黒麹', desc: 'ボス級ダメ+25%' },
};
const STYLE = {
  box: { name: '箱麹', desc: '攻撃範囲1.5倍' },
  lid: { name: '麹蓋', desc: '攻撃間隔-20%' },
};
function rollWeapon(type) {
  const koji = Object.keys(KOJI)[Math.floor(Math.random() * 3)];
  const style = Object.keys(STYLE)[Math.floor(Math.random() * 2)];
  return { type: type || 'daito', koji, style };
}
function weaponText(w) {
  if (!w) return '素の大刀';
  return wtypeOf(w).label + '：' + KOJI[w.koji].name + '×' + STYLE[w.style].name + '［' + wtypeOf(w).desc + '・' + KOJI[w.koji].desc + '・' + STYLE[w.style].desc + '］';
}
// 旧セーブ（武器種なし）の移行
if (META.weapon && !META.weapon.type) META.weapon.type = 'daito';
(META.bagWeapons || []).forEach(w => { if (w && !w.type) w.type = 'daito'; });
function kojiIs(k) { return !!(META.weapon && META.weapon.koji === k); }
function styleIs(s) { return !!(META.weapon && META.weapon.style === s); }

// 酵母（発酵技）。数値層の確定値をゲージ60スケールで移植（コスト100/100/80→60/60/48）
// 酵母は出撃前に選ぶロードアウト（戦闘中の切替は不可・2026-07-19実機フィードバック）
const YEASTS = {
  y7: { name: 'きょうかい7号', short: '7号', cost: 60, desc: '全体アルコール爆発', ult: '大発酵・アルコール爆発', color: '#ffd76e' },
  y9: { name: 'きょうかい9号', short: '9号', cost: 60, desc: '単体大打撃＋スタン', ult: '一点突破・酵母の槍', color: '#8ad9c8' },
  y6: { name: 'きょうかい6号', short: '6号', cost: 48, desc: '3秒凍結・凍結中は櫂入れ+50%', ult: '静寂・もろみ鎮め', color: '#9ad9ff' },
  y14: { name: 'きょうかい14号', short: '14号', cost: 60, desc: '純度🍶を1回復', ult: '低酸の癒し・金沢の静', color: '#f2c8d8' }, // 金沢酵母＝北陸の寒蔵で会得
  y18: { name: 'きょうかい1801', short: '1801', cost: 60, desc: '8秒間 攻速+40%・移動+20%', ult: '華やぎ・大吟醸の舞', color: '#f8b878' }, // 鬼仕込みの総本山初制圧で会得
};
if (!Array.isArray(META.yeasts) || !META.yeasts.length) META.yeasts = ['y7']; // 初期は7号のみ
if (!YEASTS[META.yeast]) META.yeast = 'y7';
if (!Array.isArray(META.bagRice)) META.bagRice = [];
if (!Array.isArray(META.bagWeapons)) META.bagWeapons = [];
if (!META.regionClear || typeof META.regionClear !== 'object') META.regionClear = {};
if (!Array.isArray(META.gokui)) META.gokui = [];
const BAG_CAP = 10; // 袋は各10個（叩き台）
function bagPush(bag, item, byRarity) {
  if (!item) return;
  bag.push(item);
  while (bag.length > BAG_CAP) {
    if (byRarity) { // 酒米：レア度が最も低い最古のものから流す（大吟醸が黙って消えない）
      let idx = 0;
      for (let i = 1; i < bag.length; i++) if (bag[i].rarity < bag[idx].rarity) idx = i;
      bag.splice(idx, 1);
    } else {
      bag.shift();
    }
  }
}

// 酒米（防具）まわり
// 酒米5種：メインスキルは米で固定（産地は実在準拠の叩き台）
const RICE_MAINS = {
  '山田錦の魂': '会心15%',
  '五百万石の魂': '移動+10%',
  '雄町の魂': '純度上限+1',
  '美山錦の魂': '糖化+10%',
  '亀の尾の魂': '発酵ダメ+20%',
};
const RICE_NAMES = Object.keys(RICE_MAINS);
function riceMainIs(name) { return !!(META.rice && META.rice.name === name); }
function playerMaxHp() { return 5 + (riceMainIs('雄町の魂') ? 1 : 0); }

const RARITY = [
  { label: '並',    color: '#c8bda0', slots: [0, 0] },
  { label: '純米',  color: '#b8d98a', slots: [1, 2] },
  { label: '吟醸',  color: '#8ad9c8', slots: [2, 3] },
  { label: '大吟醸', color: '#ffd76e', slots: [4, 4] }, // 原案どおり4枠確定
];
// レア度テーブル（数値層のEASY/NORMAL/HARD/NIGHTMAREを移植。tier=進軍の深さで決まる）
const DROP_TABLE = [
  [0.60, 0.30, 0.09, 0.01],
  [0.35, 0.40, 0.20, 0.05],
  [0.10, 0.35, 0.40, 0.15],
  [0.00, 0.00, 0.00, 1.00],
];
const SUBS = {
  amylase: { name: 'アミラーゼ活性', desc: '糖化+15%' },
  teion:   { name: '低温長期発酵',  desc: '発酵ダメ+30%' },
  meisui:  { name: '名水仕込み',    desc: '環境無効' },     // 泥蔵・寒蔵の環境悪化を打ち消す
  hiire:   { name: '火入れの極意',  desc: '対火落ち+50%' }, // 火落ち菌へのダメージ増
};
function rollDrop(tier, forcedName) {
  const table = DROP_TABLE[Math.max(0, Math.min(tier, 3))];
  let r = Math.random(), rarity = 0;
  for (let i = 0; i < 4; i++) { r -= table[i]; if (r < 0) { rarity = i; break; } }
  const [lo, hi] = RARITY[rarity].slots;
  const n = lo + Math.floor(Math.random() * (hi - lo + 1));
  const pool = Object.keys(SUBS);
  const subs = {};
  for (const k of pool.sort(() => Math.random() - 0.5).slice(0, n)) subs[k] = true;
  // 米武将を浄化した蔵は、その武将の魂が確定で宿る（先鋒は全5種からランダム）
  const name = forcedName || RICE_NAMES[Math.floor(Math.random() * RICE_NAMES.length)];
  return { name, rarity, subs };
}
function riceHas(key) { return !!(META.rice && META.rice.subs && META.rice.subs[key]); }
function riceText(r) {
  if (!r) return '酒米なし';
  return RARITY[r.rarity].label + '・' + r.name + '〈' + (RICE_MAINS[r.name] || '') + '〉' + Object.keys(r.subs || {}).map(k => '［' + SUBS[k].desc + '］').join('');
}

// ---- 効果音（Web Audio合成・ファイルレス。Mキーでミュート）----
let AC = null;
function audioInit() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
  if (AC && AC.state === 'suspended') AC.resume();
}
const sfxLast = {};
function sfx(type) {
  if (!AC || META.mute) return;
  const now = performance.now();
  if (sfxLast[type] && now - sfxLast[type] < 60) return; // 鳴りすぎ防止
  sfxLast[type] = now;
  const t = AC.currentTime;
  const tone = (wave, f0, f1, dur, vol, delay) => {
    delay = delay || 0;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = wave;
    o.frequency.setValueAtTime(f0, t + delay);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + delay + dur);
    g.gain.setValueAtTime(vol, t + delay);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t + delay); o.stop(t + delay + dur);
  };
  const noise = (dur, vol) => {
    const len = Math.floor(AC.sampleRate * dur);
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const s = AC.createBufferSource(), g = AC.createGain();
    s.buffer = buf;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    s.connect(g); g.connect(AC.destination);
    s.start(t);
  };
  if (type === 'hit') tone('square', 240 + Math.random() * 60, 120, 0.06, 0.05);
  else if (type === 'kill') tone('triangle', 560 + Math.random() * 140, 200, 0.08, 0.07);
  else if (type === 'ferment') { noise(0.35, 0.14); tone('sine', 150, 40, 0.45, 0.2); }
  else if (type === 'alarm') { tone('sawtooth', 700, 690, 0.15, 0.09); tone('sawtooth', 520, 512, 0.15, 0.09, 0.18); }
  else if (type === 'boss') { tone('sawtooth', 90, 55, 0.6, 0.15); tone('sawtooth', 136, 82, 0.6, 0.1); }
  else if (type === 'hurt') tone('square', 160, 55, 0.2, 0.12);
  else if (type === 'block') tone('triangle', 900, 1300, 0.08, 0.07);
  else if (type === 'joso') { tone('sine', 523, 523, 0.12, 0.1); tone('sine', 659, 659, 0.12, 0.1, 0.12); tone('sine', 784, 784, 0.24, 0.12, 0.24); }
}

// ---- 10地域・難易度・進軍マップ（2026-07-19 選択制に再構成）----
// 酵母は実在の系譜でピンポイント配置：6号=東北（新政・秋田）／9号=九州（香露・熊本）
// 武器種は地域の特産：火落ち菌の戦利品がその地域の武器種で固定
// 地域区分はかもしてぽん（tank5のPREFECTURES）と同一：北海道/東北/関東/甲信/北陸/東海/近畿/中国/四国/九州
// gim=風土（地域固有ギミック）。fx: esp=敵速度 spawn=湧き elite=野生酵母率 hioHp=火落ちHP bossHp=米武将HP
//                                glu=糖化量 cost=発酵コスト wave=発酵波半径 psp=自分の移動速度
// rice=特産米（米武将と確定ドロップの種類）。産地は実在準拠の叩き台
const REGIONS10 = [
  { name: '北海道', weapon: 'daito', rice: '五百万石の魂', gim: { n: '雪原', d: '敵が鈍いが湧きは多い', fx: { esp: 0.9, spawn: 1.1 } } },
  { name: '東北', weapon: 'otsuchi', rice: '亀の尾の魂', yeast: { stage: 2, y: 'y6' }, gim: { n: '吹雪', d: '寒くて糖化が鈍る（-10%）', fx: { glu: 0.9 } } }, // 寒蔵で6号（新政・秋田）
  { name: '関東', weapon: 'soken', rice: '美山錦の魂', gim: { n: '喧騒', d: '野生酵母が多い', fx: { elite: 1.3 } } },
  { name: '甲信', weapon: 'naginata', rice: '美山錦の魂', gim: { n: '果香', d: '果実の糖で発酵コスト-10%', fx: { cost: 0.9 } } },
  { name: '北陸', weapon: 'yari', rice: '五百万石の魂', yeast: { stage: 2, y: 'y14' }, gim: { n: '淡麗', d: '敵の動きが鋭い', fx: { esp: 1.12 } } }, // 寒蔵で14号（金沢）
  { name: '東海', weapon: 'soken', rice: '雄町の魂', gim: { n: '濃醇', d: '火落ち菌が硬い', fx: { hioHp: 1.2 } } },
  { name: '近畿', weapon: 'daito', rice: '山田錦の魂', gim: { n: '男酒', d: '米武将が硬い', fx: { bossHp: 1.2 } } },
  { name: '中国', weapon: 'otsuchi', rice: '雄町の魂', gim: { n: '軟水', d: '発酵波が広がる（+15%）', fx: { wave: 1.15 } } },
  { name: '四国', weapon: 'naginata', rice: '山田錦の魂', gim: { n: '急流', d: '足が速くなる（+10%）', fx: { psp: 1.1 } } },
  { name: '九州', weapon: 'yari', rice: '山田錦の魂', yeast: { stage: 1, y: 'y9' }, gim: { n: '豪快', d: '雑菌の大群が押し寄せる', fx: { spawn: 1.2 } } }, // 泥蔵で9号（香露・熊本）
];
function regionRice() { return REGIONS10[G.regionIdx].rice; }
// 鬼仕込みはその地域を寒仕込みで制圧するまで施錠（初見事故の防止・1801への二段の達成感）
function diffLocked(i) { return i === 3 && ((META.regionClear || {})[REGIONS10[G.worldSel].name] ?? -1) < 2; }
function bossNameFor(node) { return (node.boss ? '大将・' : '') + '洗脳された' + regionRice().replace('の魂', ''); }
function gimFx() { // 風土の効果（名水仕込みは風土ごと無効化）
  if (riceHas('meisui')) return {};
  return REGIONS10[G.regionIdx].gim.fx;
}
function yeastCost() { return Math.round(YEASTS[META.yeast].cost * (gimFx().cost || 1)); }
function gokuiHas(k) { return Array.isArray(META.gokui) && META.gokui.includes(k); }
function regionName() { return REGIONS10[G.regionIdx].name; }
// 難易度：敵スケールとドロップテーブル（EASY〜NIGHTMARE）が直結
const DIFFS = [
  { name: '初仕込み', scale: 0, tier: 0, desc: '敵よわめ・ドロップ並中心' },
  { name: '本仕込み', scale: 2, tier: 1, desc: '標準・純米中心／精米の技50%' },
  { name: '寒仕込み', scale: 5, tier: 2, desc: '敵つよめ・吟醸中心／精米の技35%' },
  { name: '鬼仕込み', scale: 9, tier: 3, desc: '過酷・大吟醸確定' },
];
// 1地域＝4ステージの固定連戦
// 泥蔵〜総本山の米武将＝その地域の特産米（regionRice）。先鋒だけボスなし
const RANKS = [
  [{ name: '先鋒の蔵', desc: '標準の仕込み', mod: {} }],
  [{ name: '泥蔵', desc: '野生酵母が多い', mod: { elite: 2.5 }, hasBoss: true }],
  [{ name: '寒蔵', desc: '湧きが激しい', mod: { spawn: 1.35 }, hasBoss: true }],
  [{ name: '総本山', desc: '火落ち菌が強大', mod: { hiochiHp: 1.6 }, boss: true, hasBoss: true }],
];
const GAUGE_ADD = [25, 25, 25, 25]; // 蔵制圧ごとの地域総アルコール上昇
function kuraLevel() { return DIFFS[G.diff].scale + G.rank + 1; } // 敵スケール＝難易度＋進軍段
function nodeYeast(rank) { // この地域・このステージで会得できる酵母
  const y = REGIONS10[G.regionIdx].yeast;
  return y && y.stage === rank ? y.y : null;
}
function nodeMod(key) { // 名水仕込み：泥蔵・寒蔵の環境悪化を無効化
  if (riceHas('meisui')) return 1;
  return (G.node && G.node.mod[key]) || 1;
}

// ---- 入力 ----
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  audioInit(); // 音はユーザー操作後にしか鳴らせない（ブラウザ仕様）
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyM') { META.mute = !META.mute; saveMeta(); }
  const ok = e.code === 'Space' || e.code === 'Enter';
  if (G.mode === 'title') { if (ok) G.mode = 'world'; return; }
  if (G.mode === 'world') {
    if (['ArrowLeft','KeyA'].includes(e.code)) G.worldSel = (G.worldSel + 9) % 10;
    if (['ArrowRight','KeyD'].includes(e.code)) G.worldSel = (G.worldSel + 1) % 10;
    if (['ArrowUp','KeyW','ArrowDown','KeyS'].includes(e.code)) G.worldSel = (G.worldSel + 5) % 10;
    if (e.code === 'KeyE') { G.mode = 'equip'; G.eqBack = 'world'; G.eqCol = 0; G.eqIdx = 0; return; }
    if (ok) { G.mode = 'diffsel'; G.diffSel = diffLocked(G.diff) ? 2 : G.diff; }
    return;
  }
  if (G.mode === 'diffsel') {
    if (['ArrowUp','KeyW'].includes(e.code)) G.diffSel = (G.diffSel + 3) % 4;
    if (['ArrowDown','KeyS'].includes(e.code)) G.diffSel = (G.diffSel + 1) % 4;
    if (e.code === 'Escape' || e.code === 'KeyE') { G.mode = 'world'; return; }
    if (ok && !diffLocked(G.diffSel)) enterRegion(G.worldSel, G.diffSel);
    return;
  }
  if (e.code === 'KeyC' && META.yeasts.length > 1 && G.mode !== 'battle') { // 酵母切替は戦闘外のみ
    META.yeast = META.yeasts[(META.yeasts.indexOf(META.yeast) + 1) % META.yeasts.length];
    saveMeta();
  }
  if (G.mode === 'over') { if (e.code === 'KeyR') restartRegion(); return; }
  if (G.mode === 'result') {
    const r = G.result;
    const arrow = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS'].includes(e.code);
    if (arrow && r) {
      if (r.weaponChoice && !r.weaponDone) G.wchoice = 1 - G.wchoice;
      else if (r.needChoice) G.choice = 1 - G.choice;
    }
    if (ok) confirmResult();
    return;
  }
  if (G.mode === 'regionclear') { if (ok && G.clearT > 0.8) backToWorld(); return; }
  if (G.mode === 'map') {
    const nodes = RANKS[G.rank];
    if (['ArrowLeft','KeyA','ArrowUp','KeyW'].includes(e.code)) G.selIdx = (G.selIdx + nodes.length - 1) % nodes.length;
    if (['ArrowRight','KeyD','ArrowDown','KeyS'].includes(e.code)) G.selIdx = (G.selIdx + 1) % nodes.length;
    if (e.code === 'KeyE') { G.mode = 'equip'; G.eqBack = 'map'; G.eqCol = 0; G.eqIdx = 0; return; }
    if (ok && G.mapT > 0.4) startKura(nodes[G.selIdx]);
    return;
  }
  if (G.mode === 'equip') {
    if (e.code === 'KeyE' || e.code === 'Escape') { G.mode = G.eqBack || 'world'; G.mapT = 0; return; }
    if (['ArrowLeft','KeyA'].includes(e.code)) { G.eqCol = (G.eqCol + 2) % 3; G.eqIdx = 0; }
    if (['ArrowRight','KeyD'].includes(e.code)) { G.eqCol = (G.eqCol + 1) % 3; G.eqIdx = 0; }
    const len = equipCols()[G.eqCol].items.length;
    if (len > 0) {
      if (['ArrowUp','KeyW'].includes(e.code)) G.eqIdx = (G.eqIdx + len - 1) % len;
      if (['ArrowDown','KeyS'].includes(e.code)) G.eqIdx = (G.eqIdx + 1) % len;
      if (ok) equipSelect();
    }
    return;
  }
});

// ---- タッチ操作（スマホ）----
// 左側ドラッグ=仮想スティック（タッチ時は櫂入れ自動）／右下ボタン=発酵・酵母切替／メニューはタップ
let stickId = null, stickBase = null, stickCur = null;
const FERMENT_BTN = { x: W - 80, y: H - 96, r: 44 };
const MAP_EQUIP_BTN = { x: 20, y: H - 56, w: 104, h: 38 };
const EQUIP_BACK_BTN = { x: 20, y: 20, w: 104, h: 38 };
function canvasPos(e) {
  const r = cv.getBoundingClientRect();
  const sx = r.width > 0 ? W / r.width : 1, sy = r.height > 0 ? H / r.height : 1; // レイアウト前のゼロ除算ガード
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}
const inBtn = (p, b) => b.r ? Math.hypot(p.x - b.x, p.y - b.y) < b.r + 10 : (p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h);

cv.addEventListener('pointerdown', e => {

function resultTap(p) {

function equipTap(p) {

// ---- 蒸米の島（障害物）----
// 溶け残った蒸米の塊。プレイヤーと敵の通行を阻む。発酵波と攻撃は液面を伝わるので通る
function genObstacles() {
  G.obstacles = [];
  const n = 7 + Math.floor(Math.random() * 4);
  for (let k = 0; k < n; k++) {
    for (let t = 0; t < 12; t++) {
      const a = Math.random() * Math.PI * 2;
      const d = 200 + Math.random() * (ARENA.r - 340); // 中央（開始地点）と壁際は空ける
      const x = ARENA.x + Math.cos(a) * d, y = ARENA.y + Math.sin(a) * d;
      const r = 45 + Math.random() * 45;
      if (G.obstacles.every(o => Math.hypot(o.x - x, o.y - y) > o.r + r + 90)) {
        G.obstacles.push({ x, y, r, seed: Math.random() * 10 });
        break;
      }
    }
  }
}
function pushOut(ent, rad) { // 円コライダーからの押し出し
  for (const o of G.obstacles) {
    const dx = ent.x - o.x, dy = ent.y - o.y;
    const d = Math.hypot(dx, dy);
    const min = o.r + rad;
    if (d < min) {
      if (d < 0.001) { ent.x = o.x + min; ent.y = o.y; } // 真ん中に立った退化ケース
      else { ent.x = o.x + dx / d * min; ent.y = o.y + dy / d * min; }
    }
  }
}

// プレイヤーの画面外周リング（タンク内）に湧かせる。壁際でも反対側で見つかるよう数回試す
function spawnPosNearPlayer(minD, maxD) {
  const p = G.player;
  for (let tries = 0; tries < 8; tries++) {
    const a = Math.random() * Math.PI * 2;
    const d = minD + Math.random() * (maxD - minD);
    const x = p.x + Math.cos(a) * d, y = p.y + Math.sin(a) * d;
    if (Math.hypot(x - ARENA.x, y - ARENA.y) < ARENA.r - 12 &&
        G.obstacles.every(o => Math.hypot(x - o.x, y - o.y) > o.r + 20)) return { x, y };
  }
  const a = Math.random() * Math.PI * 2; // 保険：タンクの縁
  return { x: ARENA.x + Math.cos(a) * (ARENA.r - 12), y: ARENA.y + Math.sin(a) * (ARENA.r - 12) };
}

// ---- 攻撃 ----
const SWEEP = { range: 105, arc: Math.PI * 1.25, time: 0.16, cd: 0.26 };

function attack() {
  const p = G.player;
  const wt = wtypeOf(META.weapon); // 武器種：大刀=標準／双剣=速い小範囲／長槍=直線長リーチ
  p.atkCd = SWEEP.cd * wt.cd * (styleIs('lid') ? 0.8 : 1) * (G.buffT > 0 ? 0.6 : 1); // 麹蓋-20%／華やぎ-40%
  const range = SWEEP.range * wt.range * (styleIs('box') ? 1.5 : 1); // 箱麹：範囲1.5倍（＝糖化効率）
  const arc = SWEEP.arc * wt.arc;
  G.swing = { t: 0, face: p.face, range, arc, type: (META.weapon && META.weapon.type) || 'daito' };
  let hit = 0;
  const critRate = (META.rice && META.rice.name === '山田錦の魂' ? 0.15 : 0) + (kojiIs('yellow') ? 0.15 : 0);
  const crit = Math.random() < critRate;
  const dmg = weaponDmg() * wt.dmg * (crit ? 2 : 1);
  for (const e of G.enemies) {
    const dx = e.x - p.x, dy = e.y - p.y;
    const d = Math.hypot(dx, dy);
    if (d > range + e.r) continue;
    let da = Math.atan2(dy, dx) - p.face;
    da = Math.atan2(Math.sin(da), Math.cos(da));
    if (Math.abs(da) > arc / 2) continue;
    // 凍結中は+50%（凍らせて叩き割る＝6号がロードアウト固定でも火力を持てる）
    e.hp -= dmg * (e.hiochi && riceHas('hiire') ? 1.5 : 1) * ((e.hiochi || e.riceBoss) && kojiIs('black') ? 1.25 : 1) * (G.freezeT > 0 ? 1.5 : 1); e.flash = 0.12; hit++;
    if (crit && (e.elite || e.hiochi)) addText(e.x, e.y - 30, '会心！', '#ffd76e', 14);
    const kb = (e.hiochi || e.riceBoss) ? 30 : e.elite ? 90 : 260;
    e.kx += Math.cos(p.face + da * 0.4) * kb;
    e.ky += Math.sin(p.face + da * 0.4) * kb;
  }
  if (hit) {
    sfx('hit');
    G.shake = Math.min(G.shake + 2 + hit * 0.6, 9);
    // 糖化：当てた数だけブドウ糖が溜まる（アミラーゼ活性+15%／美山錦+10%／糖化の技+10%／風土補正）
    G.glucose = Math.min(G.glucose + hit * (riceHas('amylase') ? 1.15 : 1) * (riceMainIs('美山錦の魂') ? 1.1 : 1) * (gokuiHas('tou') ? 1.1 : 1) * (gimFx().glu || 1), G.glucoseMax);
  }
}

function ferment() {
  const y = YEASTS[META.yeast];
  G.glucose = Math.max(G.glucose - yeastCost(), 0);
  G.shake = 14;
  sfx('ferment');
  G.banner = { str: y.ult, color: y.color, t: 1.1 }; // 必殺技カットイン
  const tMul = (riceHas('teion') ? 1.3 : 1) * (riceMainIs('亀の尾の魂') ? 1.2 : 1); // 低温長期発酵＋亀の尾
  if (META.yeast === 'y7') { // 大発酵・アルコール爆発：三重の爆発輪＋金色フラッシュ
    const wmax = 275 * (gimFx().wave || 1); // 中国・軟水：発酵波が広がる
    G.waves.push({ x: G.player.x, y: G.player.y, r: 10, max: wmax });
    G.waves.push({ x: G.player.x, y: G.player.y, r: 10, max: wmax, delay: 0.12, deco: true });
    G.waves.push({ x: G.player.x, y: G.player.y, r: 10, max: wmax, delay: 0.24, deco: true });
    G.flash = { rgb: '255,215,110', t: 0.3, max: 0.3 };
    G.hitstop = 0.08;
    G.shake = 18;
  } else if (META.yeast === 'y9') { // 一点突破・酵母の槍：ヒットストップ＋貫きビーム（火落ち菌→米武将の優先順）
    let target = G.hiochi || G.riceBoss;
    if (!target) {
      let best = 1e9;
      for (const e of G.enemies) {
        const score = Math.hypot(e.x - G.player.x, e.y - G.player.y) - (e.elite ? 300 : 0);
        if (score < best) { best = score; target = e; }
      }
    }
    if (target) {
      const dmg = Math.round(20 * weaponDmg() * tMul * (target.hiochi && riceHas('hiire') ? 1.5 : 1));
      target.hp -= dmg; target.flash = 0.3; target.stunT = 2;
      G.beam = { x1: G.player.x, y1: G.player.y, x2: target.x, y2: target.y, t: 0.35 };
      G.flash = { rgb: '138,217,200', t: 0.2, max: 0.2 };
      G.hitstop = 0.2; // 一瞬、時が止まる
      for (let k = 0; k < 16; k++) { // 突きの衝撃粒子
        const a = Math.random() * Math.PI * 2, v = 80 + Math.random() * 240;
        G.particles.push({ x: target.x, y: target.y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, t: 0.35 + Math.random() * 0.25, elite: true });
      }
      addText(target.x, target.y - 48, '💫', '#8ad9c8', 30);
    }
  } else if (META.yeast === 'y6') { // 静寂・もろみ鎮め：青いフラッシュと舞う結晶（凍結中は再生も止まる）
    G.freezeT = 3;
    G.flash = { rgb: '154,217,255', t: 0.35, max: 0.35 };
    for (let k = 0; k < 8; k++) {
      const a = Math.random() * Math.PI * 2, rr = Math.random() * 400;
      addText(G.player.x + Math.cos(a) * rr, G.player.y + Math.sin(a) * rr, '❄', '#c8e8ff', 16 + Math.random() * 12);
    }
  } else if (META.yeast === 'y14') { // 低酸の癒し：純度🍶を1回復
    G.player.hp = Math.min(G.player.hp + 1, playerMaxHp());
    G.flash = { rgb: '242,200,216', t: 0.3, max: 0.3 };
    addText(G.player.x, G.player.y - 60, '🍶 純度回復！', '#f2c8d8', 24);
  } else if (META.yeast === 'y18') { // 華やぎ・大吟醸の舞：8秒間 攻速+40%・移動+20%
    G.buffT = 8;
    G.flash = { rgb: '248,184,120', t: 0.3, max: 0.3 };
    addText(G.player.x, G.player.y - 60, '舞うように醸せ！', '#f8b878', 24);
  }
}

function addText(x, y, str, col, size) {
  G.texts.push({ x, y, str, col, size: size || 15, t: 0.9 });
}

function kill(e, i) {
  G.enemies.splice(i, 1);
  sfx('kill');
  G.slashes.push({ x: e.x, y: e.y, a: Math.random() * Math.PI, t: 0.18 }); // 斬撃線
  G.kills++;
  G.combo++; G.comboT = 1.3;
  for (let k = 0; k < ((e.hiochi || e.riceBoss) ? 40 : e.elite ? 14 : 6); k++) {
    const a = Math.random() * Math.PI * 2, v = 40 + Math.random() * ((e.hiochi || e.riceBoss) ? 220 : 130);
    G.particles.push({ x: e.x, y: e.y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, t: 0.4 + Math.random() * 0.3, elite: e.elite || e.hiochi, pure: e.riceBoss });
  }
  if (e.riceBoss) { // 浄化：洗脳が解け、上槽へ
    G.riceBoss = null;
    G.riceBossDone = true;
    G.shake = 14;
    addText(e.x, e.y, '浄化！正気を取り戻した！', '#e8d9ff', 28);
    joso();
  } else if (e.hiochi) {
    G.hiochi = null;
    G.hiochiDone = true;
    G.shake = 14;
    addText(e.x, e.y, '殺菌完了！', '#ffd76e', 30);
    // 戦利品：麹武器（上槽のときに装備を選ぶ）
    G.pendingWeapon = rollWeapon(REGIONS10[G.regionIdx].weapon); // 武器種は地域の特産
    addText(e.x, e.y + 34, '戦利品：' + KOJI[G.pendingWeapon.koji].name + '×' + STYLE[G.pendingWeapon.style].name + 'の' + wtypeOf(G.pendingWeapon).label + '！', '#b8d98a', 17);
    addAlcohol(8);
  } else if (e.elite) {
    addText(e.x, e.y, '野生酵母 撃破！', '#ff9d6e', 18);
    addAlcohol(5);
  } else {
    addAlcohol(1.2);
  }
}

// ---- 上槽（蔵制圧・ドロップ）----
function joso() {
  G.mode = 'result'; G.resultT = 0;
  sfx('joso');
  G.regionGauge = Math.min(G.regionGauge + GAUGE_ADD[G.rank], 100);
  // ドロップのレア度tier＝難易度に直結（絞って掘れる）。米武将を浄化した蔵は同種の米が確定
  const drop = rollDrop(DIFFS[G.diff].tier, G.riceBossDone ? regionRice() : null);
  // 装備は自動でなくプレイヤーが選ぶ（初回だけ自動装備）
  const cur = META.rice;
  const needChoice = !!cur;
  if (!cur) META.rice = drop;
  G.choice = needChoice && drop.rarity > cur.rarity ? 0 : 1; // レア度が上なら「着る」を初期選択
  // 火落ち菌の戦利品（麹武器）：初めての麹は自動装備、以降は選択
  const weaponDrop = G.pendingWeapon;
  G.pendingWeapon = null;
  let weaponAuto = false, weaponChoice = false;
  if (weaponDrop) {
    if (!META.weapon) { META.weapon = weaponDrop; weaponAuto = true; }
    else { weaponChoice = true; G.wchoice = 0; }
  }
  // 地域制圧の特典＝杜氏の極意（技能系）。精米の技は難易度に紐付く（本仕込み以上→50%、寒仕込み以上→35%）
  const gokuiMsgs = [];
  if (G.node.boss) {
    if (G.diff >= 1 && META.polish === 70) { META.polish = 50; gokuiMsgs.push('精米の技　70%→50%（攻撃力+40%）'); }
    else if (G.diff >= 2 && META.polish === 50) { META.polish = 35; gokuiMsgs.push('精米の技　50%→35%（攻撃力+70%）'); }
    if (!META.regionClear) META.regionClear = {};
    const rn = regionName();
    META.regionClear[rn] = Math.max(META.regionClear[rn] ?? -1, G.diff);
    if (G.kills > META.best) META.best = G.kills;
    // 制圧地域数のマイルストーンで極意を会得
    const clearedN = Object.keys(META.regionClear).length;
    if (clearedN >= 3 && !gokuiHas('tou')) { META.gokui.push('tou'); gokuiMsgs.push('糖化の技（糖化+10%）'); }
    if (clearedN >= 6 && !gokuiHas('kai')) { META.gokui.push('kai'); gokuiMsgs.push('回避の技（無敵時間+50%）'); }
  }
  const polished = gokuiMsgs.length ? gokuiMsgs.join('／') : null;
  // 酵母の会得＝特定の地域・特定の蔵の浄化報酬（東北の寒蔵=6号／北陸の寒蔵=14号／九州の泥蔵=9号）
  let yeastGained = null;
  const ny = nodeYeast(G.rank);
  if (ny && !META.yeasts.includes(ny)) {
    META.yeasts.push(ny);
    yeastGained = ny;
  }
  // 1801は鬼仕込みの総本山を初めて落とした証
  if (!yeastGained && G.node.boss && G.diff === 3 && !META.yeasts.includes('y18')) {
    META.yeasts.push('y18');
    yeastGained = 'y18';
  }
  saveMeta();
  G.result = { drop, needChoice, polished, yeastGained, weaponDrop, weaponAuto, weaponChoice, weaponDone: false };
}

function confirmResult() { // 上槽の確定（キーとタップの共用）
  const r = G.result;
  if (!r || G.resultT < 0.6) return;
  if (r.weaponChoice && !r.weaponDone) {
    // 選ばなかった方は袋へ（捨てない）
    if (G.wchoice === 0) { bagPush(META.bagWeapons, META.weapon); META.weapon = r.weaponDrop; }
    else bagPush(META.bagWeapons, r.weaponDrop);
    saveMeta();
    r.weaponDone = true;
    G.resultT = 0.3; // 押しっぱなしで米ページまで飛ばない程度の間
    return;
  }
  if (r.needChoice) {
    if (G.choice === 0) { bagPush(META.bagRice, META.rice, true); META.rice = r.drop; }
    else bagPush(META.bagRice, r.drop, true);
    saveMeta();
  }
  afterResult();
}

function afterResult() { // 上槽リザルトを閉じたあとの行き先
  if (G.node.boss) { G.mode = 'regionclear'; G.clearT = 0; }
  else { G.rank++; G.selIdx = 0; G.mapT = 0; G.mode = 'map'; }
}

function backToWorld() { // 地域制圧のあとはワールドマップへ帰還
  G.worldSel = G.regionIdx;
  G.mode = 'world';
}

// ---- 更新 ----
function update(dt) {
  G.t += dt;
  if (G.mode === 'map') { G.mapT += dt; return; }
  if (G.mode === 'regionclear') { G.clearT += dt; return; }
  if (G.mode === 'result') { G.resultT += dt; return; }
  if (G.mode !== 'battle') return;
  const p = G.player;

  // 移動（五百万石=速度+10%）
  const spd = 215 * (META.rice && META.rice.name === '五百万石の魂' ? 1.1 : 1) * (gimFx().psp || 1) * (G.buffT > 0 ? 1.2 : 1); // 四国・急流／華やぎ
  let mx = 0, my = 0;
  if (keys.KeyW || keys.ArrowUp) my--;
  if (keys.KeyS || keys.ArrowDown) my++;
  if (keys.KeyA || keys.ArrowLeft) mx--;
  if (keys.KeyD || keys.ArrowRight) mx++;
  if (stickId !== null && stickBase && stickCur) { // 仮想スティック優先
    const vx = stickCur.x - stickBase.x, vy = stickCur.y - stickBase.y;
    const vl = Math.hypot(vx, vy);
    if (vl > 12) { mx = vx / vl; my = vy / vl; }
  }
  if (mx || my) {
    const l = Math.hypot(mx, my);
    p.x += mx / l * spd * dt;
    p.y += my / l * spd * dt;
    p.face = Math.atan2(my, mx);
  }
  const pd = Math.hypot(p.x - ARENA.x, p.y - ARENA.y);
  const lim = ARENA.r - 18;
  if (pd > lim) {
    p.x = ARENA.x + (p.x - ARENA.x) / pd * lim;
    p.y = ARENA.y + (p.y - ARENA.y) / pd * lim;
  }
  pushOut(p, 14); // 蒸米の島は通れない
  G.camX = p.x; G.camY = p.y; // カメラはプレイヤー追従

  // 攻撃
  p.atkCd -= dt;
  if ((keys.Space || G.touchUI) && p.atkCd <= 0) attack(); // タッチ時は自動で櫂を振る
  if ((keys.KeyX || keys.Enter) && G.glucose >= yeastCost()) ferment();
  if (G.swing) { G.swing.t += dt; if (G.swing.t > SWEEP.time) G.swing = null; }
  p.inv -= dt;

  // 敵スポーン（蔵内時間と蔵の番手で増える）
  G.spawnT -= dt;
  if (G.spawnT <= 0) {
    const kt = kuraT();
    const lv = kuraLevel();
    const rate = Math.max(0.55 - kt * 0.012, 0.10) / (1 + 0.15 * (lv - 1)) / nodeMod('spawn') / (gimFx().spawn || 1);
    G.spawnT = rate;
    const n = 1 + Math.floor(kt / 25) + Math.floor((lv - 1) / 2);
    const eliteP = (0.04 + kt * 0.0007 + 0.02 * (lv - 1)) * nodeMod('elite') * (gimFx().elite || 1);
    if (G.enemies.length < 120) for (let i = 0; i < n; i++) spawnEnemy(Math.random() < eliteP); // 逃げ回り時の無限増殖を防ぐ上限
  }
  // 火落ち菌乱入判定＋出現中のペナルティ（発酵度が減る）
  if (!G.hiochiDone && !G.hiochi && G.kuraAlcohol >= 70) spawnHiochi();
  if (G.hiochi) G.kuraAlcohol = Math.max(G.kuraAlcohol - 2 * dt, 0);
  G.alarm = Math.max(G.alarm - dt, 0);
  G.freezeT = Math.max(G.freezeT - dt, 0);
  G.buffT = Math.max(G.buffT - dt, 0);
  if (G.beam) { G.beam.t -= dt; if (G.beam.t <= 0) G.beam = null; }
  if (G.banner) { G.banner.t -= dt; if (G.banner.t <= 0) G.banner = null; }
  if (G.flash) { G.flash.t -= dt; if (G.flash.t <= 0) G.flash = null; }

  // 敵更新
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    if (e.hp <= 0) { kill(e, i); continue; }
    e.flash -= dt;
    if (G.freezeT > 0) continue; // 6号の凍結：動かない・殴らない・再生もしない
    e.stunT = (e.stunT || 0) - dt;
    if (e.hiochi) { // 自己再生：放置すると押し返される
      e.regenT += dt;
      if (e.regenT >= 1.5) { e.regenT = 0; e.hp = Math.min(e.hp + e.regen, e.maxHp); }
    }
    if (e.stunT > 0) continue; // 9号のスタン：動けない（再生はする）
    const dx = p.x - e.x, dy = p.y - e.y, d = Math.hypot(dx, dy) || 1;
    e.x += (dx / d * e.sp + e.kx) * dt;
    e.y += (dy / d * e.sp + e.ky) * dt;
    e.kx *= Math.pow(0.005, dt); e.ky *= Math.pow(0.005, dt);
    pushOut(e, e.r * 0.7); // 蒸米の島を回り込ませる（多少の重なりは許容）
    // プレイヤー接触（白麹：20%で弾く）
    if (d < e.r + 14 && p.inv <= 0) {
      if (kojiIs('white') && Math.random() < 0.2) {
        p.inv = gokuiHas('kai') ? 0.75 : 0.5;
        sfx('block');
        addText(p.x, p.y - 34, '白麹が弾いた！', '#d9e8ff', 14);
        e.kx += -(dx / d) * 300; e.ky += -(dy / d) * 300;
        continue;
      }
      p.hp--; p.inv = gokuiHas('kai') ? 1.65 : 1.1; G.shake = 10; // 回避の技：無敵時間+50%
      sfx('hurt');
      for (const o of G.enemies) {
        const ox = o.x - p.x, oy = o.y - p.y, od = Math.hypot(ox, oy) || 1;
        if (od < 130) { o.kx += ox / od * 320; o.ky += oy / od * 320; }
      }
      if (p.hp <= 0) {
        G.mode = 'over';
        if (G.kills > META.best) META.best = G.kills;
        saveMeta();
      }
    }
  }

  // 発酵の衝撃波
  for (let i = G.waves.length - 1; i >= 0; i--) {
    const w = G.waves[i];
    if (w.delay && w.delay > 0) { w.delay -= dt; continue; }
    w.r += 900 * dt;
    if (!w.deco) for (let j = G.enemies.length - 1; j >= 0; j--) {
      const e = G.enemies[j];
      if (Math.hypot(e.x - w.x, e.y - w.y) >= w.r + e.r) continue;
      if (e.hiochi || e.riceBoss) { // ボス級は即死せず大ダメージのみ（1波につき1回、低温長期発酵で+30%）
        if (e.hitBy !== w) {
          e.hitBy = w;
          e.hp -= Math.round(12 * weaponDmg() * (riceHas('teion') ? 1.3 : 1) * (riceMainIs('亀の尾の魂') ? 1.2 : 1) * (e.hiochi && riceHas('hiire') ? 1.5 : 1)); // 精米で発酵も伸びる
          e.flash = 0.2;
          if (e.hp <= 0) kill(e, j);
        }
      } else { e.hp = 0; kill(e, j); }
    }
    if (w.r > w.max) G.waves.splice(i, 1);
  }

  // コンボ・演出
  G.comboT -= dt;
  if (G.comboT <= 0) G.combo = 0;
  G.shake = Math.max(G.shake - dt * 30, 0);
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const q = G.particles[i];
    q.t -= dt; q.x += q.vx * dt; q.y += q.vy * dt;
    q.vx *= 0.92; q.vy *= 0.92;
    if (q.t <= 0) G.particles.splice(i, 1);
  }
  for (let i = G.texts.length - 1; i >= 0; i--) {
    const t = G.texts[i];
    t.t -= dt; t.y -= 26 * dt;
    if (t.t <= 0) G.texts.splice(i, 1);
  }
  for (let i = G.slashes.length - 1; i >= 0; i--) {
    G.slashes[i].t -= dt;
    if (G.slashes[i].t <= 0) G.slashes.splice(i, 1);
  }
}

// ---- 主人公：若き蔵人（藍の法被・紅の鉢巻・鋭い目）----
function drawKurabito(x, y, r) {
  // 影
  cx.beginPath(); cx.ellipse(x, y + r * 0.95, r * 0.7, r * 0.26, 0, 0, 7);
  cx.fillStyle = 'rgba(0,0,0,0.25)'; cx.fill();
  // 鉢巻のたなびき（風になびく2本）
  const wv = Math.sin(G.t * 6) * r * 0.14;
  cx.strokeStyle = '#c8323c'; cx.lineCap = 'round';
  for (const s of [0, 1]) {
    cx.lineWidth = Math.max(2, r * (0.15 - s * 0.04));
    cx.beginPath();
    cx.moveTo(x - r * 0.42, y - r * 0.6);
    cx.quadraticCurveTo(x - r * (1.1 + s * 0.2), y - r * (0.55 - s * 0.3) + wv, x - r * (1.75 + s * 0.25), y - r * (0.4 - s * 0.5) + wv * 1.6);
    cx.stroke();
  }
  // 胴（藍の法被）
  cx.beginPath();
  cx.moveTo(x - r * 0.62, y - r * 0.12);
  cx.quadraticCurveTo(x - r * 0.74, y + r * 0.85, x - r * 0.4, y + r * 0.92);
  cx.lineTo(x + r * 0.4, y + r * 0.92);
  cx.quadraticCurveTo(x + r * 0.74, y + r * 0.85, x + r * 0.62, y - r * 0.12);
  cx.closePath();
  cx.fillStyle = '#26324e'; cx.fill();
  cx.lineWidth = Math.max(1.5, r * 0.09); cx.lineJoin = 'round'; cx.strokeStyle = '#101826'; cx.stroke();
  // 襟（白のV）
  cx.beginPath();
  cx.moveTo(x - r * 0.34, y - r * 0.08);
  cx.lineTo(x, y + r * 0.5);
  cx.lineTo(x + r * 0.34, y - r * 0.08);
  cx.lineWidth = Math.max(1.5, r * 0.13); cx.strokeStyle = '#e8e2d2'; cx.stroke();
  // 頭
  cx.beginPath(); cx.arc(x, y - r * 0.48, r * 0.5, 0, 7);
  cx.fillStyle = '#f0cfa8'; cx.fill();
  // 髪
  cx.beginPath(); cx.arc(x, y - r * 0.52, r * 0.52, Math.PI * 1.02, Math.PI * 1.98);
  cx.lineWidth = r * 0.22; cx.strokeStyle = '#181820'; cx.stroke();
  // 鉢巻（額）
  cx.beginPath(); cx.arc(x, y - r * 0.48, r * 0.5, Math.PI * 1.06, Math.PI * 1.94);
  cx.lineWidth = r * 0.17; cx.strokeStyle = '#c8323c'; cx.stroke();
  // 鋭い目
  cx.lineWidth = Math.max(1.2, r * 0.08); cx.strokeStyle = '#141018'; cx.lineCap = 'round';
  for (const s of [-1, 1]) {
    cx.beginPath();
    cx.moveTo(x + s * r * 0.32, y - r * 0.52);
    cx.lineTo(x + s * r * 0.1, y - r * 0.44);
    cx.stroke();
  }
}

// ---- クール試作：金グラデ文字（黒フチ明朝）----
function goldText(str, x, y, size, strokeW) {
  cx.font = 'bold ' + size + 'px serif';
  const g = cx.createLinearGradient(0, y - size * 0.55, 0, y + size * 0.55);
  g.addColorStop(0, '#f8ecc0'); g.addColorStop(0.5, '#e8c86a'); g.addColorStop(1, '#a87828');
  cx.lineWidth = strokeW; cx.lineJoin = 'round'; cx.strokeStyle = '#0d0a06';
  cx.strokeText(str, x, y);
  cx.fillStyle = g;
  cx.fillText(str, x, y);
}

// 画面外のボスの方向を画面端に示す矢印（広いタンクで見失わないため）
function bossArrow(e, glyph) {
  const sx = e.x - G.camX + W / 2, sy = e.y - G.camY + H / 2;
  const m = 46;
  if (sx > m && sx < W - m && sy > m && sy < H - m) return; // 画面内なら不要
  const px = Math.max(m, Math.min(W - m, sx)), py = Math.max(m, Math.min(H - m, sy));
  const ang = Math.atan2(sy - py, sx - px);
  cx.beginPath(); cx.arc(px, py, 22, 0, 7);
  cx.fillStyle = 'rgba(20,10,8,0.65)'; cx.fill();
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.font = '22px serif';
  cx.fillText(glyph, px, py + 1);
  cx.save();
  cx.translate(px + Math.cos(ang) * 30, py + Math.sin(ang) * 30);
  cx.rotate(ang);
  cx.beginPath(); cx.moveTo(8, 0); cx.lineTo(-4, -6); cx.lineTo(-4, 6); cx.closePath();
  cx.fillStyle = '#ffd76e'; cx.fill();
  cx.restore();
}

// ---- 描画 ----
function draw() {
  if (G.mode === 'title') { drawTitle(); return; }
  if (G.mode === 'world') { drawWorld(); return; }
  if (G.mode === 'diffsel') { drawWorld(); drawDiffsel(); return; }
  if (G.mode === 'equip') { drawEquip(); return; }
  if (G.mode === 'map') { drawMap(); return; }
  if (G.mode === 'regionclear') { drawRegionClear(); return; }
  cx.save();
  cx.clearRect(0, 0, W, H);
  const shx = G.shake > 0 ? (Math.random() - 0.5) * G.shake : 0;
  const shy = G.shake > 0 ? (Math.random() - 0.5) * G.shake : 0;
  cx.translate(W / 2 - G.camX + shx, H / 2 - G.camY + shy); // カメラ変換（ワールド座標→画面）

  // タンク
  cx.beginPath(); cx.arc(ARENA.x, ARENA.y, ARENA.r + 14, 0, 7);
  cx.fillStyle = '#141110'; cx.fill();
  const grad = cx.createRadialGradient(ARENA.x, ARENA.y - 60, 40, ARENA.x, ARENA.y, ARENA.r);
  grad.addColorStop(0, '#d8b878'); grad.addColorStop(1, '#9a7a48');
  cx.beginPath(); cx.arc(ARENA.x, ARENA.y, ARENA.r, 0, 7);
  cx.fillStyle = grad; cx.fill();
  // もろみの泡
  cx.fillStyle = 'rgba(255,255,255,0.14)';
  for (let i = 0; i < 90; i++) {
    const a = i * 2.62 + G.t * 0.13, rr = (i * 53.7) % ARENA.r * 0.92;
    cx.beginPath();
    cx.arc(ARENA.x + Math.cos(a) * rr, ARENA.y + Math.sin(a) * rr, 3 + (i % 4), 0, 7);
    cx.fill();
  }

  // 凍結（6号）：もろみが静まる
  if (G.freezeT > 0) {
    cx.beginPath(); cx.arc(ARENA.x, ARENA.y, ARENA.r, 0, 7);
    cx.fillStyle = 'rgba(150,205,255,' + Math.min(0.10 * G.freezeT, 0.25) + ')';
    cx.fill();
  }

  // 蒸米の島（障害物）
  for (const o of G.obstacles) {
    const og = cx.createRadialGradient(o.x - o.r * 0.3, o.y - o.r * 0.3, o.r * 0.2, o.x, o.y, o.r);
    og.addColorStop(0, '#e8d6ac'); og.addColorStop(1, '#a8895c');
    cx.beginPath(); cx.arc(o.x, o.y, o.r, 0, 7);
    cx.fillStyle = og; cx.fill();
    cx.strokeStyle = 'rgba(140,120,85,0.35)'; cx.lineWidth = 3; cx.stroke();
    cx.fillStyle = 'rgba(255,255,255,0.75)';
    for (let i = 0; i < 6; i++) {
      const aa = o.seed + i * 1.05, rr2 = o.r * (0.18 + (i % 3) * 0.22);
      cx.beginPath();
      cx.ellipse(o.x + Math.cos(aa) * rr2, o.y + Math.sin(aa) * rr2, 5, 3, aa, 0, 7);
      cx.fill();
    }
  }

  // 衝撃波
  for (const w of G.waves) {
    cx.beginPath(); cx.arc(w.x, w.y, w.r, 0, 7);
    cx.strokeStyle = 'rgba(255,215,110,' + (1 - w.r / w.max) + ')';
    cx.lineWidth = 16; cx.stroke();
  }
  // 9号のビーム
  if (G.beam) {
    cx.strokeStyle = 'rgba(138,217,200,' + Math.min(G.beam.t * 4, 1) + ')';
    cx.lineWidth = 6; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(G.beam.x1, G.beam.y1); cx.lineTo(G.beam.x2, G.beam.y2); cx.stroke();
  }

  // 敵
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  for (const e of G.enemies) {
    const wob = Math.sin(G.t * 6 + e.wob) * 2;
    if (e.hiochi || e.riceBoss) {
      const au = cx.createRadialGradient(e.x, e.y, 8, e.x, e.y, 58);
      if (e.hiochi) { // 赤黒いオーラ
        au.addColorStop(0, 'rgba(140,10,25,0.55)');
        au.addColorStop(1, 'rgba(60,0,10,0)');
      } else { // 洗脳の紫オーラ
        au.addColorStop(0, 'rgba(110,40,150,0.55)');
        au.addColorStop(1, 'rgba(40,0,60,0)');
      }
      cx.beginPath(); cx.arc(e.x, e.y, 58, 0, 7);
      cx.fillStyle = au; cx.fill();
    }
    const glyph = e.hiochi ? '👹' : e.riceBoss ? '🍙' : e.elite ? '😈' : '🦠';
    cx.font = (e.hiochi ? 58 : e.riceBoss ? (e.r > 30 ? 64 : 56) : e.elite ? 44 : 22) + 'px serif';
    if (e.flash > 0) {
      cx.save(); cx.filter = 'brightness(3)';
      cx.fillText(glyph, e.x, e.y + wob);
      cx.restore();
    } else {
      cx.fillText(glyph, e.x, e.y + wob);
    }
    if (e.hiochi || e.riceBoss) { // ボスHPバー
      cx.fillStyle = 'rgba(20,10,8,0.6)';
      cx.fillRect(e.x - 32, e.y - 48, 64, 6);
      cx.fillStyle = e.hiochi ? '#ff5a4a' : '#b98ad9';
      cx.fillRect(e.x - 32, e.y - 48, 64 * e.hp / e.maxHp, 6);
    }
  }

  // プレイヤー（蔵人）。華やぎ中は金色のオーラ
  const p = G.player;
  if (G.buffT > 0) {
    const au = cx.createRadialGradient(p.x, p.y, 6, p.x, p.y, 40);
    au.addColorStop(0, 'rgba(248,184,120,0.5)');
    au.addColorStop(1, 'rgba(248,184,120,0)');
    cx.beginPath(); cx.arc(p.x, p.y, 40, 0, 7);
    cx.fillStyle = au; cx.fill();
  }
  if (!(p.inv > 0 && Math.floor(G.t * 14) % 2)) {
    drawKurabito(p.x, p.y, 18);
  }

  // 櫂棒スイング
  if (G.swing) {
    const pr = G.swing.t / SWEEP.time;
    const sa = G.swing.arc || SWEEP.arc;
    const sr = G.swing.range || SWEEP.range;
    const type = G.swing.type;
    const face = G.swing.face;
    // 三日月剣閃を描くヘルパー（漆黒×金画風：グラデ＋白エッジ）
    const crescent = (s0, s1) => {
      cx.beginPath();
      cx.arc(p.x, p.y, sr, s0, s1);
      cx.arc(p.x, p.y, sr * 0.5, s1, s0, true);
      cx.closePath();
      const bg2 = cx.createRadialGradient(p.x, p.y, sr * 0.4, p.x, p.y, sr);
      bg2.addColorStop(0, 'rgba(255,255,255,0)');
      bg2.addColorStop(0.7, 'rgba(255,246,214,0.5)');
      bg2.addColorStop(1, 'rgba(255,255,255,0.95)');
      cx.fillStyle = bg2; cx.fill();
      cx.beginPath(); cx.arc(p.x, p.y, sr, s0, s1);
      cx.lineWidth = 2.5; cx.strokeStyle = 'rgba(255,255,255,0.9)'; cx.stroke();
    };
    if (type === 'yari') {
      // 長槍：弧を描かず「突き」。柄がface方向へ伸びて戻る＋スピードライン
      const cos = Math.cos(face), sin = Math.sin(face);
      const nx = -sin, ny = cos;
      const ext = pr < 0.5 ? 14 + (sr - 14) * (pr / 0.5) : sr - (sr - 14) * ((pr - 0.5) / 0.5);
      cx.strokeStyle = '#4a3018'; cx.lineWidth = 7; cx.lineCap = 'round';
      cx.beginPath();
      cx.moveTo(p.x + cos * 8, p.y + sin * 8);
      cx.lineTo(p.x + cos * ext, p.y + sin * ext);
      cx.stroke();
      // スピードライン（柄の左右＋中央、先端側ほど不透明）
      for (const off of [-6, 6, 0]) {
        const ox = nx * off, oy = ny * off;
        const d0 = ext * 0.4, d1 = ext;
        const g = cx.createLinearGradient(p.x + cos * d0 + ox, p.y + sin * d0 + oy, p.x + cos * d1 + ox, p.y + sin * d1 + oy);
        g.addColorStop(0, 'rgba(255,255,255,0)');
        g.addColorStop(1, 'rgba(255,255,255,0.95)');
        cx.strokeStyle = g; cx.lineWidth = off === 0 ? 2 : 1.4;
        cx.beginPath();
        cx.moveTo(p.x + cos * d0 + ox, p.y + sin * d0 + oy);
        cx.lineTo(p.x + cos * d1 + ox, p.y + sin * d1 + oy);
        cx.stroke();
      }
    } else if (type === 'otsuchi') {
      // 大槌：振りかぶり（0〜0.4・光跡なし）→ 叩きつけ（0.4〜1.0）
      const cos0 = Math.cos(face), sin0 = Math.sin(face);
      if (pr < 0.4) {
        const bang = face + Math.PI;
        const bl = 26 + 12 * (pr / 0.4);
        cx.strokeStyle = '#4a3018'; cx.lineWidth = 8; cx.lineCap = 'round';
        cx.beginPath();
        cx.moveTo(p.x, p.y);
        cx.lineTo(p.x + Math.cos(bang) * bl, p.y + Math.sin(bang) * bl);
        cx.stroke();
      } else {
        if (!G.swing.impacted) { G.shake = Math.max(G.shake, 8); G.swing.impacted = true; } // 着弾の一撃は一度だけ
        const k = (pr - 0.4) / 0.6;
        const ang = face + Math.PI * (1 - k);
        crescent(Math.min(ang, face), Math.max(ang, face));
        cx.strokeStyle = '#4a3018'; cx.lineWidth = 8; cx.lineCap = 'round';
        cx.beginPath();
        cx.moveTo(p.x + Math.cos(ang) * 12, p.y + Math.sin(ang) * 12);
        cx.lineTo(p.x + Math.cos(ang) * sr, p.y + Math.sin(ang) * sr);
        cx.stroke();
        // 衝撃リング（着弾点＝face方向 range*0.7、半径20→60に広がって消える）
        const rx = p.x + cos0 * sr * 0.7, ry = p.y + sin0 * sr * 0.7;
        const rr = 20 + k * 40;
        cx.globalAlpha = 1 - k;
        cx.strokeStyle = 'rgba(255,255,255,0.95)'; cx.lineWidth = 3;
        cx.beginPath(); cx.arc(rx, ry, rr, 0, 7); cx.stroke();
        cx.globalAlpha = 1;
      }
    } else if (type === 'naginata') {
      // 薙刀：光跡と柄が全周1回転する
      const lead = face - Math.PI + 2 * Math.PI * pr;
      const tail = Math.min(1.4, 2 * Math.PI * pr);
      crescent(lead - tail, lead);
      cx.strokeStyle = '#4a3018'; cx.lineWidth = 7; cx.lineCap = 'round';
      cx.beginPath();
      cx.moveTo(p.x + Math.cos(lead) * 14, p.y + Math.sin(lead) * 14);
      cx.lineTo(p.x + Math.cos(lead) * (sr - 6), p.y + Math.sin(lead) * (sr - 6));
      cx.stroke();
    } else {
      const twin = G.swing.type === 'soken';
      const blades = twin
        ? [{ from: G.swing.face - sa / 2, dir: 1 }, { from: G.swing.face + sa / 2, dir: -1 }]
        : [{ from: G.swing.face - sa / 2, dir: 1 }];
      for (const b of blades) { // 剣閃：刃先ほど鋭く光る三日月ブレード（双剣は2本が交差）
        const lead = b.from + b.dir * sa * pr * (twin ? 0.5 : 1);
        const tail = Math.min(sa * pr * (twin ? 0.5 : 1), 1.1);
        const s0 = b.dir === 1 ? lead - tail : lead;
        const s1 = b.dir === 1 ? lead : lead + tail;
        crescent(s0, s1);
        // 櫂棒本体
        cx.strokeStyle = '#4a3018'; cx.lineWidth = twin ? 5 : 7; cx.lineCap = 'round';
        cx.beginPath();
        cx.moveTo(p.x + Math.cos(lead) * 14, p.y + Math.sin(lead) * 14);
        cx.lineTo(p.x + Math.cos(lead) * (sr - 6), p.y + Math.sin(lead) * (sr - 6));
        cx.stroke();
      }
    }
  }

  // パーティクル
  for (const q of G.particles) {
    cx.globalAlpha = Math.max(q.t * 2, 0);
    cx.fillStyle = q.pure ? '#fffdf5' : q.elite ? '#ff9d6e' : '#b8d98a';
    cx.beginPath(); cx.arc(q.x, q.y, q.elite ? 4 : 2.5, 0, 7);
    cx.fill();
  }
  cx.globalAlpha = 1;

  // 斬撃線（撃破の瞬間に白い線が走る）
  for (const s of G.slashes) {
    const al = s.t / 0.18;
    const len = 46 + (1 - al) * 30;
    cx.globalAlpha = al;
    cx.lineCap = 'round';
    for (const [ang, w] of [[s.a, 3.5], [s.a + 0.5, 2]]) {
      cx.beginPath();
      cx.moveTo(s.x - Math.cos(ang) * len, s.y - Math.sin(ang) * len);
      cx.lineTo(s.x + Math.cos(ang) * len, s.y + Math.sin(ang) * len);
      cx.lineWidth = w; cx.strokeStyle = '#fff';
      cx.stroke();
    }
  }
  cx.globalAlpha = 1;

  // フロートテキスト
  for (const t of G.texts) {
    cx.globalAlpha = Math.min(t.t * 2, 1);
    cx.font = 'bold ' + t.size + 'px serif';
    cx.fillStyle = t.col;
    cx.fillText(t.str, t.x, t.y);
  }
  cx.globalAlpha = 1;
  cx.restore();

  // ビネット（四隅を落として戦場の空気に）
  const vg = cx.createRadialGradient(W / 2, H / 2, H * 0.42, W / 2, H / 2, H * 0.88);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.5)');
  cx.fillStyle = vg; cx.fillRect(0, 0, W, H);

  // 警報フラッシュ
  if (G.alarm > 0 && Math.floor(G.t * 8) % 2) {
    cx.fillStyle = 'rgba(255,40,30,' + (0.22 * G.alarm) + ')';
    cx.fillRect(0, 0, W, H);
  }
  // 必殺フラッシュ
  if (G.flash) {
    cx.fillStyle = 'rgba(' + G.flash.rgb + ',' + (0.28 * G.flash.t / G.flash.max).toFixed(3) + ')';
    cx.fillRect(0, 0, W, H);
  }
  // 必殺技カットイン
  if (G.banner) {
    cx.globalAlpha = Math.min(G.banner.t * 2.5, 1);
    cx.fillStyle = 'rgba(20,12,8,0.55)';
    cx.fillRect(0, H * 0.30, W, 64);
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.font = 'bold 38px serif';
    goldText(G.banner.str, W / 2, H * 0.30 + 32, 40, 7);
    cx.globalAlpha = 1;
  }

  // ---- UI ----
  // 画面外ボスの方向矢印
  if (G.hiochi) bossArrow(G.hiochi, '👹');
  if (G.riceBoss) bossArrow(G.riceBoss, '🍙');
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  // 純度（残機）
  cx.font = '26px serif';
  for (let i = 0; i < playerMaxHp(); i++) {
    cx.globalAlpha = i < p.hp ? 1 : 0.18;
    cx.fillText('🍶', 16 + i * 32, 12);
  }
  cx.globalAlpha = 1;
  // 撃破数
  cx.textAlign = 'right';
  cx.fillStyle = '#f2e9d4';
  cx.font = 'bold 34px serif';
  cx.fillText(G.kills + ' 斬', W - 20, 10);
  cx.font = '13px serif';
  cx.fillStyle = '#9a8c72';
  cx.fillText('最高 ' + META.best + ' 斬 ／ 制圧 ' + Object.keys(META.regionClear || {}).length + '/10地域', W - 20, 48);
  // 装備（右下パネル。タッチ時はボタンと被るので出さない）
  if (!G.touchUI) drawEquipUI(false);
  // コンボ
  if (G.combo >= 5) {
    cx.textAlign = 'center'; cx.textBaseline = 'top';
    const csz = Math.min(22 + G.combo * 0.4, 40);
    cx.textBaseline = 'middle';
    goldText(G.combo + ' 連斬', W / 2, 14 + csz / 2, csz, 6);
    cx.textBaseline = 'top';
  }
  // 蔵の発酵度（制圧ゲージ）
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  cx.font = 'bold 15px serif';
  cx.fillStyle = G.hiochi ? '#ff5a4a' : '#f2e9d4';
  cx.fillText(regionName() + '〔' + DIFFS[G.diff].name + '〕・' + G.node.name + '　発酵度 ' + Math.floor(G.kuraAlcohol) + '%', W / 2, 54);
  cx.fillStyle = 'rgba(20,10,8,0.5)';
  cx.fillRect(W / 2 - 110, 76, 220, 7);
  cx.fillStyle = G.hiochi ? '#ff5a4a' : '#b8a26e';
  cx.fillRect(W / 2 - 110, 76, 220 * Math.min(G.kuraAlcohol / 100, 1), 7);
  // 糖化ゲージ（「糖」の文字が満ちる）
  const mr = G.glucose / G.glucoseMax;
  cx.textAlign = 'left'; cx.textBaseline = 'bottom';
  cx.font = 'bold 44px serif';
  cx.fillStyle = 'rgba(255,215,110,0.18)';
  cx.fillText('糖', 18, H - 14);
  if (mr > 0) {
    cx.save();
    cx.beginPath(); cx.rect(0, H - 14 - 48 * mr, 90, 48 * mr); cx.clip();
    cx.fillStyle = mr >= 1 ? '#ffd76e' : '#b8a26e';
    cx.fillText('糖', 18, H - 14);
    cx.restore();
  }
  cx.font = '13px serif'; cx.fillStyle = '#9a8c72';
  cx.fillText('必殺：' + YEASTS[META.yeast].ult + '（' + YEASTS[META.yeast].short + '）', 74, H - 48);
  if (G.glucose >= yeastCost() && Math.floor(G.t * 3) % 2) {
    cx.font = '13px serif'; cx.fillStyle = '#ffd76e';
    cx.fillText('Xで発酵！', 74, H - 30);
  }
  // 操作説明（タッチ時は仮想ボタン）
  if (G.touchUI) {
    const ready = G.glucose >= yeastCost();
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.beginPath(); cx.arc(FERMENT_BTN.x, FERMENT_BTN.y, FERMENT_BTN.r, 0, 7);
    cx.fillStyle = ready ? 'rgba(255,215,110,0.85)' : 'rgba(120,100,60,0.35)';
    cx.fill();
    cx.font = 'bold 20px serif'; cx.fillStyle = ready ? '#3a2c14' : '#141008';
    cx.fillText('発酵', FERMENT_BTN.x, FERMENT_BTN.y);
    if (stickBase && stickCur) {
      cx.beginPath(); cx.arc(stickBase.x, stickBase.y, 40, 0, 7);
      cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 3; cx.stroke();
      const vx = stickCur.x - stickBase.x, vy = stickCur.y - stickBase.y;
      const vl = Math.hypot(vx, vy) || 1, cl = Math.min(vl, 40);
      cx.beginPath(); cx.arc(stickBase.x + vx / vl * cl, stickBase.y + vy / vl * cl, 16, 0, 7);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.fill();
    }
  } else {
    cx.textAlign = 'center';
    cx.font = '13px serif'; cx.fillStyle = '#6a5c48';
    cx.fillText('WASD/矢印: 櫂を運ぶ　Space: 櫂入れ（糖化）　X: 発酵', W / 2, H - 8);
  }

  // 上槽リザルト
  if (G.mode === 'result' && G.result) {
    cx.fillStyle = 'rgba(20,12,8,0.78)';
    cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillStyle = '#f2e9d4';
    cx.font = 'bold 40px serif';
    cx.fillText('上槽！　' + G.node.name + ' 制圧', W / 2, H / 2 - 110);
    if (G.result.weaponChoice && !G.result.weaponDone) {
      // ---- 武器（麹）ページ：火落ち菌の戦利品 ----
      const wd = G.result.weaponDrop;
      cx.font = '15px serif'; cx.fillStyle = '#b8d98a';
      cx.fillText('火落ち菌の戦利品', W / 2, H / 2 - 72);
      cx.font = 'bold 26px serif'; cx.fillStyle = '#b8d98a';
      cx.fillText(KOJI[wd.koji].name + '×' + STYLE[wd.style].name + ' の' + wtypeOf(wd).label, W / 2, H / 2 - 40);
      cx.font = '17px serif'; cx.fillStyle = '#c8bda0';
      cx.fillText(KOJI[wd.koji].desc + '　' + STYLE[wd.style].desc, W / 2, H / 2 - 4);
      cx.font = '13px serif'; cx.fillStyle = '#6a5c48';
      cx.fillText('←→で選択', W / 2, H / 2 + 26);
      const wopts = [
        { label: '持ち替える（今のは袋へ）', w: wd },
        { label: '袋にしまって今のまま　　', w: META.weapon },
      ];
      wopts.forEach((o, i) => {
        const sel = G.wchoice === i;
        cx.font = (sel ? 'bold ' : '') + '16px serif';
        cx.fillStyle = sel ? '#ffd76e' : '#8a7c62';
        cx.fillText((sel ? '▶ ' : '　 ') + o.label + '：' + weaponText(o.w), W / 2, H / 2 + 52 + i * 28);
      });
      if (G.resultT > 0.6 && Math.floor(G.t * 2) % 2 === 0) {
        cx.font = '17px serif'; cx.fillStyle = '#9a8c72';
        cx.fillText('Space で決定（次は酒米）', W / 2, H / 2 + 130);
      }
      return;
    }
    // ---- 酒米ページ ----
    const d = G.result.drop;
    if (G.riceBossDone) {
      cx.font = '15px serif'; cx.fillStyle = '#c9a0ff';
      cx.fillText('洗脳が解けた。浄化された魂が防具として宿る', W / 2, H / 2 - 72);
    }
    cx.font = 'bold 26px serif';
    cx.fillStyle = RARITY[d.rarity].color;
    cx.fillText((G.riceBossDone ? '浄化の証：' : 'ドロップ：') + RARITY[d.rarity].label + '・' + d.name, W / 2, H / 2 - 40);
    const subKeys = Object.keys(d.subs);
    cx.font = '17px serif';
    cx.fillStyle = '#c8bda0';
    cx.fillText(subKeys.length ? subKeys.map(k => SUBS[k].name + '（' + SUBS[k].desc + '）').join('　') : 'サブスキルなし', W / 2, H / 2 - 4);
    if (G.result.weaponAuto) {
      cx.font = '15px serif'; cx.fillStyle = '#b8d98a';
      cx.fillText('はじめての麹武器：' + weaponText(META.weapon) + ' を装備！', W / 2, H / 2 + 104);
    }
    if (G.result.yeastGained) {
      const y = YEASTS[G.result.yeastGained];
      cx.font = 'bold 17px serif'; cx.fillStyle = '#8ad9c8';
      cx.fillText('新酵母を会得：' + y.name + '（' + y.desc + '）　Cキーで切替', W / 2, H / 2 + 128);
    }
    if (G.result.needChoice) {
      const opts = [
        { label: '着替える（今のは袋へ）', rice: d },
        { label: '袋にしまって今のまま　', rice: META.rice },
      ];
      cx.font = '13px serif'; cx.fillStyle = '#6a5c48';
      cx.fillText('←→で選択', W / 2, H / 2 + 26);
      opts.forEach((o, i) => {
        const sel = G.choice === i;
        cx.font = (sel ? 'bold ' : '') + '16px serif';
        cx.fillStyle = sel ? '#ffd76e' : '#8a7c62';
        cx.fillText((sel ? '▶ ' : '　 ') + o.label + '：' + riceText(o.rice), W / 2, H / 2 + 52 + i * 28);
      });
    } else {
      cx.fillStyle = '#b8d98a';
      cx.fillText('はじめての酒米。装備した！', W / 2, H / 2 + 40);
    }

function equipSelect() {
  if (G.eqCol === 0) {

// ---- ループ ----
let last = performance.now();
function loop(now) {
  const rawDt = Math.min((now - last) / 1000, 0.05);
  last = now;
  let dt = rawDt;
  if (G.hitstop > 0) { G.hitstop -= rawDt; dt = rawDt * 0.15; } // 必殺のヒットストップ
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
